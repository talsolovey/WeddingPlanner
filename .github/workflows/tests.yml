name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  offline-suite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vow-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run the offline test suite
        env:
          VOW_STORAGE_BACKEND: files  # tests never touch real backends
        run: python -m unittest discover -s tests -v
      - name: Validate eval cases
        run: python -m evals.run_evals --dry-run
