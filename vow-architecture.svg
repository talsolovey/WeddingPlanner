<svg viewBox="0 0 1500 950" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B5F58"/>
    </marker>
    <marker id="arrRose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#A05C6D"/>
    </marker>
  </defs>

  <rect width="1500" height="950" fill="#FAF6EF"/>

  <!-- ======================= title ======================= -->
  <text x="48" y="56" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#332D2A">Vow — end-to-end architecture</text>
  <text x="48" y="82" font-size="14" fill="#8B7E76">A couple's click, a guest's reply, and the 08:00 schedule all flow through the same agent core. Every box is real code.</text>

  <!-- ======================= numbered key (top right) ======================= -->
  <text x="1140" y="50" font-size="13" font-weight="bold" fill="#332D2A">Follow the numbers</text>
  <g font-size="11" fill="#5C534D">
    <text x="1140" y="70">① Couple signs in, works the wedding, approves</text>
    <text x="1140" y="88">② “Ask Vow” — contract check, brief, auto-seat</text>
    <text x="1140" y="106">③ Features read/write whole documents</text>
    <text x="1140" y="124">④ Agent acts via whitelisted, backed-up tools</text>
    <text x="1140" y="142">⑤ Saves emit events → rules wake Vow (≤ 2/day)</text>
    <text x="1140" y="160">⑥ Approved nudges go out via WhatsApp (Twilio)</text>
    <text x="1140" y="178">⑦ Guest replies via a magic RSVP link</text>
    <text x="1140" y="196">⑧ 08:00 headless run — same orchestrator, via MCP</text>
  </g>

  <!-- ======================= the couple ======================= -->
  <rect x="40" y="150" width="200" height="110" rx="14" fill="#FFFFFF" stroke="#E7DCD2"/>
  <text x="60" y="182" font-family="Georgia, serif" font-size="17" fill="#332D2A">The couple</text>
  <g font-size="11.5" fill="#5C534D">
    <text x="60" y="204">signs in (Supabase Auth)</text>
    <text x="60" y="221">adds data · asks Vow</text>
    <text x="60" y="238">approves Vow's proposals</text>
  </g>

  <!-- ======================= a guest ======================= -->
  <rect x="40" y="560" width="200" height="130" rx="14" fill="#FFFFFF" stroke="#E7DCD2"/>
  <text x="60" y="592" font-family="Georgia, serif" font-size="17" fill="#332D2A">A guest</text>
  <g font-size="11.5" fill="#5C534D">
    <text x="60" y="614">gets a WhatsApp invite</text>
    <text x="60" y="631">or nudge, replies through</text>
    <text x="60" y="648">a magic RSVP link —</text>
    <text x="60" y="665">no account, no password</text>
  </g>

  <!-- ======================= web app ======================= -->
  <rect x="290" y="110" width="350" height="400" rx="14" fill="#FFFFFF" stroke="#E7DCD2"/>
  <text x="306" y="140" font-family="Georgia, serif" font-size="17" fill="#332D2A">Web app — Flask</text>
  <text x="632" y="140" font-size="11" fill="#8B7E76" text-anchor="end">app/ · a blueprint per feature</text>

  <rect x="305" y="152" width="320" height="46" rx="8" fill="#F6F1E8" stroke="#E7DCD2"/>
  <text x="315" y="170" font-size="11.5" font-weight="bold" fill="#332D2A">Auth gate</text>
  <text x="315" y="188" font-size="11" fill="#5C534D">every page &amp; API session-gated · per-IP rate limits</text>

  <text x="305" y="222" font-size="12.5" font-weight="bold" fill="#332D2A">Feature blueprints</text>
  <g font-size="10.5" fill="#5C534D">
    <rect x="305" y="232" width="101" height="26" rx="13" fill="#FAF6EF" stroke="#E7DCD2"/><text x="355" y="249" text-anchor="middle">Home · brief</text>
    <rect x="414" y="232" width="101" height="26" rx="13" fill="#FAF6EF" stroke="#E7DCD2"/><text x="464" y="249" text-anchor="middle">Budget</text>
    <rect x="523" y="232" width="101" height="26" rx="13" fill="#FAF6EF" stroke="#E7DCD2"/><text x="573" y="249" text-anchor="middle">Guests</text>
    <rect x="305" y="264" width="101" height="26" rx="13" fill="#FAF6EF" stroke="#E7DCD2"/><text x="355" y="281" text-anchor="middle">Seating</text>
    <rect x="414" y="264" width="101" height="26" rx="13" fill="#FAF6EF" stroke="#E7DCD2"/><text x="464" y="281" text-anchor="middle">Contracts</text>
    <rect x="523" y="264" width="101" height="26" rx="13" fill="#FAF6EF" stroke="#E7DCD2"/><text x="573" y="281" text-anchor="middle">Invitations</text>
    <rect x="305" y="296" width="101" height="26" rx="13" fill="#FAF6EF" stroke="#E7DCD2"/><text x="355" y="313" text-anchor="middle">Checklist</text>
    <rect x="414" y="296" width="101" height="26" rx="13" fill="#FAF6EF" stroke="#E7DCD2"/><text x="464" y="313" text-anchor="middle">Timeline</text>
    <rect x="523" y="296" width="101" height="26" rx="13" fill="#FAF6EF" stroke="#E7DCD2"/><text x="573" y="313" text-anchor="middle">✦ Ask-Vow chat</text>
  </g>

  <rect x="305" y="340" width="320" height="62" rx="8" fill="#FFFFFF" stroke="#E7DCD2"/>
  <text x="315" y="358" font-size="11.5" font-weight="bold" fill="#332D2A">whatsapp.py — sends real messages</text>
  <text x="315" y="375" font-size="11" fill="#5C534D">nudges &amp; invite waves via Twilio · paced</text>
  <rect x="315" y="382" width="146" height="16" rx="8" fill="#FDF7F8" stroke="#D9A8B4"/>
  <text x="388" y="394" font-size="10" fill="#A05C6D" text-anchor="middle">≤ 3 reminders / household</text>

  <rect x="305" y="416" width="320" height="78" rx="8" fill="#FFFFFF" stroke="#E7DCD2"/>
  <text x="315" y="434" font-size="11.5" font-weight="bold" fill="#332D2A">rsvp.py — the only public endpoint</text>
  <text x="315" y="451" font-size="11" fill="#5C534D">capability token = one household's RSVP, nothing else</text>
  <text x="315" y="468" font-size="11" fill="#5C534D">guest free-text injection-scanned before storing</text>
  <text x="315" y="485" font-size="11" fill="#5C534D">strict rate limit</text>

  <!-- ======================= agent core ======================= -->
  <rect x="690" y="110" width="400" height="400" rx="14" fill="#FBF1F4" stroke="#E3C6CE"/>
  <text x="706" y="140" font-family="Georgia, serif" font-size="17" fill="#332D2A">Agent core</text>
  <text x="1074" y="140" font-size="11" fill="#8B7E76" text-anchor="end">agent/ · no direct write path to data</text>

  <rect x="705" y="152" width="370" height="88" rx="8" fill="#FFFFFF" stroke="#E3C6CE"/>
  <text x="715" y="170" font-size="11.5" font-weight="bold" fill="#332D2A">harness.py — plan → act → observe</text>
  <text x="715" y="187" font-size="11" fill="#5C534D">plans 3–5 steps · replans on surprises · tool errors are</text>
  <text x="715" y="204" font-size="11" fill="#5C534D">observed, not fatal · picks one of 6 skills per task</text>
  <text x="715" y="221" font-size="11" fill="#5C534D">writes what it learns to LESSONS.md (scanned) — memory</text>

  <rect x="705" y="252" width="370" height="128" rx="8" fill="#FFFFFF" stroke="#E3C6CE"/>
  <text x="715" y="270" font-size="11.5" font-weight="bold" fill="#332D2A">orchestrator.py — weekly brief</text>
  <rect x="925" y="258" width="70" height="16" rx="8" fill="#FDF7F8" stroke="#D9A8B4"/>
  <text x="960" y="270" font-size="10" fill="#A05C6D" text-anchor="middle">4 × $0.15</text>
  <rect x="1001" y="258" width="66" height="16" rx="8" fill="#FDF7F8" stroke="#D9A8B4"/>
  <text x="1034" y="270" font-size="10" fill="#A05C6D" text-anchor="middle">$0.65 cap</text>
  <text x="715" y="290" font-size="11" fill="#5C534D">1. computed facts — code does the arithmetic first</text>
  <text x="715" y="307" font-size="11" fill="#5C534D">2. four specialists fan out in parallel, isolated contexts:</text>
  <text x="730" y="324" font-size="11" fill="#5C534D">contracts · budget · guests · logistics</text>
  <text x="715" y="341" font-size="11" fill="#5C534D">3. a verifier re-checks each one against its skill checklist</text>
  <text x="715" y="358" font-size="11" fill="#5C534D">4. one merge call ranks it all — escalate, don't repeat</text>

  <rect x="705" y="392" width="370" height="50" rx="8" fill="#FFFFFF" stroke="#E3C6CE"/>
  <text x="715" y="410" font-size="11.5" font-weight="bold" fill="#332D2A">triggers.py — event wake-ups</text>
  <rect x="953" y="398" width="112" height="16" rx="8" fill="#FDF7F8" stroke="#D9A8B4"/>
  <text x="1009" y="410" font-size="10" fill="#A05C6D" text-anchor="middle">≤ 2 wakes / day</text>
  <text x="715" y="428" font-size="11" fill="#5C534D">decline spike, capacity breach → wake · rules are code</text>

  <rect x="705" y="452" width="370" height="48" rx="8" fill="#FFFFFF" stroke="#E3C6CE"/>
  <text x="715" y="470" font-size="11.5" font-weight="bold" fill="#332D2A">trust.py + outcomes.py — earned autonomy</text>
  <text x="715" y="487" font-size="11" fill="#5C534D">propose-and-wait by default · 10 approvals promote, 1 rejection revokes</text>

  <!-- ======================= openai ======================= -->
  <rect x="1140" y="215" width="320" height="95" rx="14" fill="#FFFFFF" stroke="#E7DCD2"/>
  <text x="1156" y="245" font-family="Georgia, serif" font-size="16" fill="#332D2A">OpenAI API</text>
  <g font-size="11" fill="#5C534D">
    <text x="1156" y="266">GPT-4o for all product reasoning</text>
    <text x="1156" y="283">every call logged with tokens + dollars</text>
    <text x="1156" y="300">logs/run_log.jsonl</text>
  </g>

  <!-- ======================= storage ======================= -->
  <rect x="290" y="560" width="630" height="130" rx="14" fill="#F6F1E8" stroke="#E7DCD2"/>
  <text x="306" y="590" font-family="Georgia, serif" font-size="16" fill="#332D2A">storage.py — one door to all data</text>
  <g font-size="11" fill="#5C534D">
    <text x="306" y="613">every dataset = one JSON document, scoped per couple</text>
    <text x="306" y="630">atomic mutate() · agent writes backed up · a write can never blank a dataset</text>
    <text x="306" y="647">Supabase Postgres JSONB (RLS on, service key server-side only)</text>
    <text x="306" y="664">— or plain local files for dev and the offline test suite</text>
  </g>

  <!-- ======================= autonomous lane ======================= -->
  <rect x="290" y="740" width="1170" height="160" rx="14" fill="#F3EDE4" stroke="#E7DCD2"/>
  <text x="306" y="770" font-family="Georgia, serif" font-size="16" fill="#332D2A">Unattended — the same brain on a schedule</text>
  <text x="1444" y="770" font-size="11" fill="#8B7E76" text-anchor="end">autonomous/</text>

  <g font-size="10.5" fill="#5C534D">
    <rect x="310" y="790" width="130" height="56" rx="8" fill="#FFFFFF" stroke="#E7DCD2"/>
    <text x="375" y="812" text-anchor="middle" font-weight="bold" fill="#332D2A">launchd</text>
    <text x="375" y="829" text-anchor="middle">daily at 08:00</text>

    <rect x="470" y="790" width="230" height="56" rx="8" fill="#FFFFFF" stroke="#E7DCD2"/>
    <text x="585" y="808" text-anchor="middle" font-weight="bold" fill="#332D2A">claude -p, headless</text>
    <text x="585" y="824" text-anchor="middle">allow-list: 2 Vow tools + Read/Write</text>
    <text x="585" y="839" text-anchor="middle">≤ 15 turns · ≤ $1 per run</text>

    <rect x="730" y="790" width="180" height="56" rx="8" fill="#FFFFFF" stroke="#E7DCD2"/>
    <text x="820" y="812" text-anchor="middle" font-weight="bold" fill="#332D2A">MCP server</text>
    <text x="820" y="829" text-anchor="middle">run_weekly_brief</text>

    <rect x="940" y="790" width="230" height="56" rx="8" fill="#FFFFFF" stroke="#E7DCD2"/>
    <text x="1055" y="812" text-anchor="middle" font-weight="bold" fill="#332D2A">brief lands on Home</text>
    <text x="1055" y="829" text-anchor="middle">+ dated draft in outbox/</text>

    <rect x="1200" y="790" width="180" height="56" rx="8" fill="#FFFFFF" stroke="#E7DCD2"/>
    <text x="1290" y="812" text-anchor="middle" font-weight="bold" fill="#332D2A">Telegram ping</text>
    <text x="1290" y="829" text-anchor="middle">self-notification only</text>
  </g>
  <line x1="440" y1="818" x2="468" y2="818" stroke="#6B5F58" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="700" y1="818" x2="728" y2="818" stroke="#6B5F58" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="910" y1="818" x2="938" y2="818" stroke="#6B5F58" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="1170" y1="818" x2="1198" y2="818" stroke="#6B5F58" stroke-width="2" marker-end="url(#arr)"/>
  <text x="310" y="878" font-size="11" fill="#8B7E76">deny hook blocks shell &amp; secrets · Stop hook: no dated draft → not finished · every run leaves a cost record in agent-runs/</text>

  <!-- ======================= arrows ======================= -->
  <!-- 1 couple -> web -->
  <line x1="240" y1="193" x2="288" y2="193" stroke="#6B5F58" stroke-width="2" marker-end="url(#arr)"/>
  <circle cx="264" cy="178" r="10" fill="#A05C6D"/><text x="264" y="182" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>

  <!-- 2 web -> agent -->
  <line x1="640" y1="258" x2="688" y2="258" stroke="#6B5F58" stroke-width="2" marker-end="url(#arr)"/>
  <circle cx="664" cy="243" r="10" fill="#A05C6D"/><text x="664" y="247" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>

  <!-- 3 web -> storage -->
  <line x1="465" y1="510" x2="465" y2="558" stroke="#6B5F58" stroke-width="2" marker-end="url(#arr)"/>
  <circle cx="448" cy="534" r="10" fill="#A05C6D"/><text x="448" y="538" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>

  <!-- 4 agent -> storage -->
  <line x1="850" y1="510" x2="850" y2="558" stroke="#6B5F58" stroke-width="2" marker-end="url(#arr)"/>
  <circle cx="833" cy="534" r="10" fill="#A05C6D"/><text x="833" y="538" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">4</text>

  <!-- 5 storage -> agent (events, dashed) -->
  <path d="M920,610 L955,610 L955,512" fill="none" stroke="#A05C6D" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrRose)"/>
  <circle cx="972" cy="560" r="10" fill="#A05C6D"/><text x="972" y="564" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5</text>

  <!-- 6 web (whatsapp) -> guest -->
  <path d="M290,372 C 232,388 182,470 170,556" fill="none" stroke="#6B5F58" stroke-width="2" marker-end="url(#arr)"/>
  <circle cx="203" cy="460" r="10" fill="#A05C6D"/><text x="203" y="464" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">6</text>

  <!-- 7 guest -> web (rsvp) -->
  <path d="M240,612 C 278,610 284,505 288,458" fill="none" stroke="#6B5F58" stroke-width="2" marker-end="url(#arr)"/>
  <circle cx="277" cy="545" r="10" fill="#A05C6D"/><text x="277" y="549" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">7</text>

  <!-- 8 lane -> agent -->
  <line x1="1000" y1="740" x2="1000" y2="512" stroke="#6B5F58" stroke-width="2" marker-end="url(#arr)"/>
  <circle cx="1017" cy="628" r="10" fill="#A05C6D"/><text x="1017" y="632" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">8</text>

  <!-- agent -> openai -->
  <line x1="1090" y1="262" x2="1138" y2="262" stroke="#6B5F58" stroke-width="2" marker-end="url(#arr)"/>
  <text x="1114" y="250" font-size="10.5" fill="#8B7E76" text-anchor="middle">model calls</text>

  <!-- footer -->
  <text x="48" y="932" font-size="12" fill="#8B7E76">Caps stack: $0.15 / specialist → $0.65 / orchestrator run → $1 / headless run → ≤ 2 event wakes / day · threat model &amp; defense→test map: vow-app/SECURITY.md</text>
</svg>
