<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>You're invited ✦</title>
<link rel="stylesheet" href="/vow.css">
<script src="/vow-shell.js"></script>
<style>
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2.5rem 1.2rem; min-height: 100vh; box-sizing: border-box;
  }
  main {
    width: 100%; max-width: 480px; background: var(--card); border: 1px solid var(--hairline);
    border-radius: 20px; padding: 3rem 2.5rem; box-sizing: border-box;
    box-shadow: 0 1px 3px rgba(38,34,42,0.05); text-align: center;
  }
  .mark { color: var(--rose); font-size: 1rem; letter-spacing: 0.3em; margin-bottom: 1.4rem; }
  .families { text-transform: uppercase; letter-spacing: 0.24em; font-size: 0.68rem; font-weight: 600; color: var(--ink-soft); margin: 0 0 1rem; }
  h1 { font-family: var(--serif); font-weight: 400; font-size: 2.5rem; line-height: 1.15; margin: 0; }
  .invite-line { font-family: var(--serif); font-style: italic; color: var(--ink-soft); margin: 0.8rem 0 0; font-size: 1.02rem; }
  .when { color: var(--ink); margin: 1.4rem 0 0; font-size: 0.95rem; }
  .when .venue { color: var(--ink-soft); }
  .rule { height: 1px; background: var(--hairline); margin: 2rem 0; }
  .choice-row { display: flex; gap: 0.8rem; }
  .choice {
    flex: 1; padding: 0.9rem; border-radius: 12px; border: 1.5px solid var(--hairline);
    background: var(--card); color: var(--ink); font: inherit; font-size: 0.95rem; font-weight: 500; cursor: pointer;
  }
  .choice.yes { font-weight: 600; }
  .choice.no { color: var(--ink-soft); }
  .choice.on { border-color: var(--rose-deep); background: var(--rose-deep); color: #fff; }
  label.rsvp { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-soft); font-weight: 600; margin: 0 0 0.4rem; }
  label.rsvp .soft { color: var(--ink-faint); text-transform: none; letter-spacing: 0; }
  .stepper { display: flex; align-items: center; gap: 0.8rem; }
  .stepper button {
    width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--hairline);
    background: var(--card); font-size: 1.1rem; cursor: pointer; color: var(--ink-soft);
  }
  .stepper .count { font-family: var(--serif); font-size: 1.5rem; min-width: 2ch; text-align: center; }
  .note-input { width: 100%; box-sizing: border-box; padding: 0.75rem 1rem; border: 1px solid var(--hairline); border-radius: 12px; font: inherit; font-size: 0.92rem; color: var(--ink); background: #fff; outline: none; }
  .note-input:focus { border-color: var(--rose); }
  .send-btn { width: 100%; margin-top: 1.8rem; background: var(--rose-deep); color: #fff; border: 0; border-radius: 999px; padding: 0.85rem; font: inherit; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
  .send-btn:hover { background: var(--rose); }
  .deadline { color: var(--ink-faint); font-size: 0.78rem; margin: 1rem 0 0; }
  .thanks { animation: vow-rise 0.6s ease both; padding: 0.5rem 0 1rem; }
  .thanks h2 { font-family: var(--serif); font-weight: 400; font-size: 1.9rem; margin: 0; }
  .thanks .line { font-family: var(--serif); font-style: italic; color: var(--ink-soft); margin: 0.7rem 0 0; font-size: 1rem; }
</style>
</head>
<body data-chrome="none">
<main id="card">
  <div style="color:var(--ink-soft)">Looking for your invitation…</div>
</main>

<script>
(async function () {
  const esc = VOW.esc;
  const card = document.getElementById("card");
  // Everything after /rsvp/ — "<token>" (legacy) or "<couple>/<token>";
  // the API mirrors both shapes.
  const token = location.pathname.replace(/^\/rsvp\//, "");

  let info, profile;
  try {
    const res = await fetch("/api/rsvp/" + token);
    info = await res.json();
    if (!res.ok) throw new Error(info.error || "This RSVP link isn't valid.");
    profile = info; // couple names + venue ride along on the public payload
  } catch (e) {
    card.innerHTML = `
      <div class="mark">✦</div>
      <h1 style="font-size:1.6rem">Hmm, this link isn't working</h1>
      <p style="color:var(--ink-soft);font-size:0.92rem;margin-top:0.8rem">${esc(e.message)}<br>Ask the couple to send it again.</p>`;
    return;
  }

  const names = [profile.partner_a, profile.partner_b].filter(Boolean).join(" & ") || "The couple";
  const maxParty = info.party_size + (info.plus_one_allowed && info.plus_one_name ? 1 : 0);
  const state = {
    choice: info.rsvp === "declined" ? "no" : "yes",
    count: Math.min(Math.max(info.attending_count || info.party_size, 1), maxParty),
    note: info.notes || "",
    sent: ["confirmed", "declined"].includes(info.rsvp),
  };

  const dateLong = info.wedding_date
    ? new Date(info.wedding_date + "T00:00:00").toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" }) : "";
  const deadline = info.rsvp_deadline
    ? new Date(info.rsvp_deadline + "T00:00:00").toLocaleDateString("en-US", { month: "long", day: "numeric" }) : "";

  function render() {
    const head = `
      <div class="mark">✦</div>
      <p class="families">Together with their families</p>
      <h1>${esc(names)}</h1>
      <p class="invite-line">invite the ${esc(info.household)} to celebrate with them</p>
      <p class="when">${esc(dateLong)}${profile.venue ? `<br><span class="venue">${esc(profile.venue)}</span>` : ""}</p>
      <div class="rule"></div>`;

    if (state.sent) {
      const yes = state.choice === "yes";
      card.innerHTML = head + `
        <div class="thanks">
          <div style="color:var(--rose);font-size:1.3rem;margin-bottom:0.8rem">${yes ? "✦" : "🤍"}</div>
          <h2>${yes ? "See you there!" : "We'll miss you"}</h2>
          <p class="line">${yes
            ? `${esc(names)} can't wait to celebrate with all ${state.count} of you.`
            : `Thank you for letting ${esc(names)} know — they're sending love.`}</p>
          <button class="btn tertiary" id="change" style="color:var(--ink-faint);font-size:0.8rem;margin-top:1.6rem">Change our reply</button>
        </div>`;
      document.getElementById("change").onclick = () => { state.sent = false; render(); };
      return;
    }

    const yes = state.choice === "yes";
    card.innerHTML = head + `
      <div class="choice-row">
        <button class="choice yes ${yes ? "on" : ""}" id="say-yes">Joyfully accept</button>
        <button class="choice no ${!yes ? "on" : ""}" id="say-no">Regretfully decline</button>
      </div>
      ${yes ? `
      <div style="text-align:left;margin-top:1.6rem">
        <label class="rsvp">How many of you are coming? <span class="soft">up to ${maxParty}</span></label>
        <div class="stepper">
          <button id="minus">−</button>
          <span class="count" id="count">${state.count}</span>
          <button id="plus">+</button>
        </div>
        <label class="rsvp" style="margin:1.4rem 0 0.4rem">A note for the couple <span class="soft">optional</span></label>
        <input class="note-input" id="note" placeholder="We can't wait!" value="${esc(state.note)}">
      </div>` : ""}
      <button class="send-btn" id="send">Send our reply</button>
      <p class="deadline">${deadline ? `Please reply by ${deadline} · ` : ""}it takes half a minute</p>`;

    document.getElementById("say-yes").onclick = () => { state.choice = "yes"; render(); };
    document.getElementById("say-no").onclick = () => { state.choice = "no"; render(); };
    if (yes) {
      document.getElementById("minus").onclick = () => { state.count = Math.max(1, state.count - 1); document.getElementById("count").textContent = state.count; };
      document.getElementById("plus").onclick = () => { state.count = Math.min(maxParty, state.count + 1); document.getElementById("count").textContent = state.count; };
      document.getElementById("note").oninput = (e) => { state.note = e.target.value; };
    }
    document.getElementById("send").onclick = send;
  }

  async function send() {
    const yes = state.choice === "yes";
    try {
      const res = await fetch("/api/rsvp/" + token, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          rsvp: yes ? "confirmed" : "declined",
          attending_count: yes ? state.count : 0,
          notes: state.note.trim(),
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Something went wrong — try again.");
      state.sent = true;
      render();
    } catch (e) {
      alert(e.message);
    }
  }

  render();
})();
</script>
</body>
</html>
