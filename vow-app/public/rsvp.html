<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP — Vow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  .rsvp-wrap { max-width: 560px; margin: 0 auto; }
  .choice { display: flex; gap: 1rem; margin: 1rem 0; }
  .choice button { flex: 1; padding: 1rem; border-radius: var(--radius); border: 2px solid var(--line); background: var(--bg-soft); font-size: 1rem; cursor: pointer; }
  .choice button.on { border-color: var(--rose-deep); color: var(--rose-deep); font-weight: 600; }
  label.lbl { display: block; font-size: .8rem; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-soft); margin: 1rem 0 .3rem; }
</style>
</head>
<body>
  <header class="site-header">
    <span class="logo">Vow <span class="logo-mark">✦</span></span>
  </header>

  <main class="page rsvp-wrap">
    <div id="loading"><div class="status"><div class="spinner"></div>Finding your invitation…</div></div>

    <div id="form" style="display:none;">
      <p class="eyebrow">You're invited</p>
      <h1 id="hh-name"></h1>
      <p class="lede" id="dates"></p>

      <div class="choice">
        <button id="yes">Joyfully accepts</button>
        <button id="no">Regretfully declines</button>
      </div>

      <div id="details" style="display:none;">
        <label class="lbl" for="attending">How many of you are coming? (up to <span id="max-party"></span>)</label>
        <input class="field" id="attending" type="number" min="1" style="width:6rem;">

        <div id="plus-one-box" style="display:none;">
          <label class="lbl" for="plus-one">Your plus-one's name (optional)</label>
          <input class="field" id="plus-one" placeholder="Full name">
        </div>

        <label class="lbl" for="notes">A note for the couple (optional)</label>
        <input class="field" id="notes" maxlength="300" placeholder="Can't wait!">
      </div>

      <div style="margin-top:1.5rem;">
        <button id="send" class="btn-primary" disabled>Send RSVP</button>
      </div>
      <div id="msg" style="margin-top:1rem;"></div>
    </div>

    <div id="done" style="display:none;">
      <p class="eyebrow">Thank you</p>
      <h1 id="done-title"></h1>
      <p class="lede" id="done-text"></p>
    </div>
  </main>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const token = location.pathname.split("/").pop();
let info = null, rsvp = "";

async function load() {
  const res = await fetch("/api/rsvp/" + encodeURIComponent(token));
  const json = await res.json();
  if (!res.ok) {
    $("loading").innerHTML = `<p class="status">⚠ ${esc(json.error || "This link isn't valid.")}</p>`;
    return;
  }
  info = json;
  $("hh-name").textContent = info.household;
  $("dates").textContent = (info.wedding_date ? `Wedding: ${info.wedding_date}. ` : "") +
                           (info.rsvp_deadline ? `Please reply by ${info.rsvp_deadline}.` : "");
  $("max-party").textContent = info.party_size + (info.plus_one_allowed ? " +1" : "");
  $("attending").max = info.party_size + (info.plus_one_allowed ? 1 : 0);
  $("attending").value = info.attending_count || info.party_size;
  $("plus-one-box").style.display = info.plus_one_allowed ? "" : "none";
  $("plus-one").value = info.plus_one_name || "";
  $("notes").value = info.notes || "";
  if (info.rsvp === "confirmed") pick("confirmed");
  if (info.rsvp === "declined") pick("declined");
  $("loading").style.display = "none";
  $("form").style.display = "";
}

function pick(value) {
  rsvp = value;
  $("yes").classList.toggle("on", value === "confirmed");
  $("no").classList.toggle("on", value === "declined");
  $("details").style.display = value === "confirmed" ? "" : "none";
  $("send").disabled = false;
}
$("yes").addEventListener("click", () => pick("confirmed"));
$("no").addEventListener("click", () => pick("declined"));

$("send").addEventListener("click", async () => {
  $("send").disabled = true;
  $("msg").innerHTML = "";
  const body = {
    rsvp,
    attending_count: parseInt($("attending").value || "0", 10),
    plus_one_name: $("plus-one").value,
    notes: $("notes").value,
  };
  try {
    const res = await fetch("/api/rsvp/" + encodeURIComponent(token), {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || "Could not save your RSVP.");
    $("form").style.display = "none";
    $("done").style.display = "";
    $("done-title").textContent = rsvp === "confirmed" ? "See you there!" : "We'll miss you";
    $("done-text").textContent = rsvp === "confirmed"
      ? `You've RSVP'd for ${json.attending_count}. You can update this any time with the same link.`
      : "Thanks for letting us know. If plans change, this link still works.";
  } catch (err) {
    $("msg").innerHTML = `<p class="status">⚠ ${esc(err.message)}</p>`;
    $("send").disabled = false;
  }
});

load();
</script>
</body>
</html>
