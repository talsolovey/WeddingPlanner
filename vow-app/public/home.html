<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vow ✦ — Home</title>
<link rel="stylesheet" href="/vow.css">
<script src="/vow-shell.js"></script>
<style>
  main { width: 100%; max-width: 880px; margin: 0 auto; padding: 3.5rem 1.5rem 4rem; flex: 1; }
  .hero {
    text-align: center; margin-bottom: 3.2rem; padding-top: 0.5rem;
    background: radial-gradient(ellipse 70% 55% at 50% 0%, rgba(160,92,109,0.08), transparent);
    animation: vow-rise 0.7s ease both;
  }
  .hero-sparkles { position: relative; height: 0; max-width: 420px; margin: 0 auto; pointer-events: none; }
  .hero-sparkles span { position: absolute; }
  .hero h1 { font-family: var(--serif); font-weight: 400; font-size: 3.4rem; line-height: 1.1; letter-spacing: -0.01em; margin: 0; }
  .hero h1 em { color: var(--rose); }
  .hero .dateline { color: var(--ink-soft); margin: 0.8rem 0 0; font-size: 0.98rem; }
  .arch {
    width: 156px; height: 196px; display: block; margin: 0 auto 1.5rem; padding: 0; border: none;
    border-radius: 78px 78px 16px 16px; overflow: hidden; cursor: pointer;
    box-shadow: 0 10px 30px -14px rgba(133,73,90,0.35); background: #f6f1ec; position: relative;
  }
  .arch img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .arch .ph {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    text-align: center; color: var(--ink-faint); font-size: 0.72rem; padding: 1.4rem;
    border: 1.5px dashed #ddd3ca; border-radius: 78px 78px 16px 16px; line-height: 1.5;
  }
  .hero-progress { max-width: 340px; margin: 1.6rem auto 0; }
  .hero-progress p { color: var(--ink-faint); font-size: 0.78rem; margin: 0.5rem 0 0; }
  .hero-progress b { color: var(--rose); font-weight: 600; }

  .focus-card { background: var(--card); border: 1px solid var(--hairline); border-radius: 16px; padding: 1.8rem 2rem; box-shadow: var(--card-shadow); }
  .focus-head { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.4rem; }
  .focus-head h2 { font-family: var(--serif); font-weight: 500; font-size: 1.35rem; margin: 0; }
  .focus-sub { color: var(--ink-soft); font-size: 0.9rem; margin: 0 0 1.2rem; }
  .focus-row { display: flex; gap: 1rem; align-items: flex-start; padding: 1.05rem 0; border-top: 1px solid var(--divider); }
  .focus-check {
    flex: none; width: 22px; height: 22px; margin-top: 2px; border-radius: 50%;
    border: 1.5px solid #ddd3ca; background: transparent; color: var(--card);
    font-size: 0.7rem; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .focus-row.done .focus-check { background: var(--rose); border-color: var(--rose); }
  .focus-title { font-weight: 600; font-size: 0.98rem; }
  .focus-row.done .focus-title { text-decoration: line-through; }
  .focus-row.done .focus-body { opacity: 0.5; }
  .focus-row details summary { list-style: none; cursor: pointer; color: var(--ink-soft); font-size: 0.85rem; margin-top: 0.1rem; }
  .focus-row details summary::-webkit-details-marker { display: none; }
  .focus-row details p { color: var(--ink-soft); font-size: 0.85rem; margin: 0.3rem 0 0; }
  .later-row { display: flex; gap: 1rem; align-items: flex-start; padding: 0.9rem 0; border-bottom: 1px solid var(--divider); }
  .later-circle { flex: none; width: 22px; height: 22px; margin-top: 2px; border-radius: 50%; border: 1.5px solid #ddd3ca; }
  .reassure { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1.2rem; }
  .activity { display: flex; flex-direction: column; gap: 0.4rem; border-top: 1px solid var(--divider); margin-top: 1.2rem; padding-top: 1rem; }
  .activity-row { display: flex; align-items: center; gap: 0.6rem; font-size: 0.8rem; color: var(--ink-soft); }
  .avatar {
    flex: none; width: 20px; height: 20px; border-radius: 50%; font-size: 0.62rem; font-weight: 600;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .avatar.rose { background: #f0e0e4; color: #85495a; }
  .avatar.lavender { background: #e8e3ee; color: #6b5a80; }
  .activity-row b { color: var(--ink); font-weight: 600; }

  .steps { border-top: 1px solid var(--divider); padding: 1.4rem 0 0.6rem; }
  .steps-list { display: flex; flex-direction: column; gap: 0.9rem; }
  .step-row { display: flex; gap: 0.9rem; align-items: center; }
  .step-dot { flex: none; width: 10px; height: 10px; border-radius: 50%; background: transparent; border: 1.5px solid #ddd3ca; }
  .step-row .label { font-size: 0.92rem; color: var(--ink-faint); }
  .step-row .note { font-size: 0.8rem; color: var(--ink-faint); }
  .step-row.active .step-dot, .step-row.done .step-dot { background: var(--rose); border-color: var(--rose); }
  .step-row.active .step-dot { animation: vow-pulse 1.1s ease-in-out infinite; }
  .step-row.active .label, .step-row.done .label { color: var(--ink); }
  .steps-caption { color: var(--ink-faint); font-size: 0.8rem; margin: 1.3rem 0 0.4rem; }

  .glance { margin-top: 2.4rem; display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
  .glance a { text-decoration: none; color: inherit; padding: 0.4rem 1.4rem; border-right: 1px solid var(--hairline); }
  .glance a:first-child { padding-left: 0; }
  .glance a:last-child { border-right: none; padding-right: 0; }
  .glance .stat { font-family: var(--serif); font-size: 1.45rem; margin-top: 0.15rem; }
  .glance .stat.empty { color: var(--ink-faint); }
  .glance .status { font-size: 0.8rem; color: var(--ink-soft); }
  .glance .status.red { color: var(--red); }
  .glance .status.rose { color: var(--rose); }
  @media (max-width: 720px) {
    .glance { grid-template-columns: 1fr 1fr; }
    .glance a { border-right: none; padding: 0.6rem 0; }
    .hero h1 { font-size: 2.4rem; }
  }
</style>
</head>
<body data-page="home">
<main>
  <section class="hero">
    <div class="hero-sparkles" aria-hidden="true">
      <span style="left:8%;top:52px;color:#c9a1ac;font-size:0.7rem;animation:vow-drift 7s ease-in-out infinite">✦</span>
      <span style="right:10%;top:96px;color:#d8b9c1;font-size:0.55rem;animation:vow-drift 9s ease-in-out 2.5s infinite">✦</span>
      <span style="right:22%;top:20px;color:#c9a1ac;font-size:0.45rem;animation:vow-drift 8s ease-in-out 4.8s infinite">✦</span>
    </div>
    <p class="eyebrow rose" id="hero-eyebrow" style="margin:0 0 1.3rem">&nbsp;</p>
    <button class="arch" id="photo-slot" title="Add your engagement photo">
      <span class="ph">your favorite photo of the two of you</span>
    </button>
    <input type="file" id="photo-input" accept="image/*" hidden>
    <h1 id="hero-count">&nbsp;</h1>
    <p class="dateline" id="hero-dateline">&nbsp;</p>
    <div class="hero-progress" id="hero-progress" hidden>
      <div class="bar"><i class="gradient" id="progress-fill" style="width:0%"></i></div>
      <p id="progress-caption"></p>
    </div>
  </section>

  <section class="focus-card" id="focus-card"></section>

  <section class="glance" id="glance"></section>
</main>

<script>
(async function () {
  const $ = (id) => document.getElementById(id);
  const esc = VOW.esc, money = VOW.money;

  const [profile, overview, brief] = await Promise.all([
    VOW.loadProfile(),
    fetch("/api/overview").then((r) => r.json()),
    fetch("/api/weekly-brief/latest").then((r) => r.json()).catch(() => ({ exists: false })),
  ]);

  const names = VOW.coupleNames() || "there";
  const isNew = overview.guests.household_count === 0 && overview.budget.item_count === 0;

  /* ---------- hero ---------- */
  $("hero-eyebrow").textContent = `${isNew ? "Welcome" : VOW.greeting()}, ${names}`;

  const dateStr = (profile && profile.wedding_date) || overview.wedding_date;
  if (dateStr) {
    const wedding = new Date(dateStr + "T00:00:00");
    const days = Math.round((wedding - new Date().setHours(0, 0, 0, 0)) / 86400000);
    $("hero-count").innerHTML = `${days} days <em>until “I do”</em>`;
    const long = wedding.toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
    const venue = (profile && profile.venue) || "venue not chosen yet";
    $("hero-dateline").textContent = `${long} · ${venue}`;
  } else {
    $("hero-count").innerHTML = `Someday <em>until “I do”</em>`;
    $("hero-dateline").textContent = `no date yet · ${(profile && profile.venue) || "venue not chosen yet"}`;
  }

  if (!isNew) {
    const { settled_count = 0, item_count = 0 } = overview.budget;
    const pct = item_count ? Math.round((settled_count / item_count) * 100) : 0;
    $("hero-progress").hidden = false;
    $("progress-fill").style.width = pct + "%";
    $("progress-caption").innerHTML =
      `Your planning is <b>${pct}% done</b> — ${settled_count} of ${item_count} vendors settled. You're ahead of most couples.`;
  }

  /* photo */
  function renderPhoto() {
    const slot = $("photo-slot");
    if (profile && profile.photo) {
      slot.innerHTML = `<img src="${profile.photo}" alt="Engagement photo">`;
    } else {
      slot.innerHTML = `<span class="ph">your favorite photo of the two of you</span>`;
    }
  }
  renderPhoto();
  $("photo-slot").onclick = () => $("photo-input").click();
  $("photo-input").onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const img = new Image();
    img.onload = async () => {
      const scale = Math.min(1, 600 / Math.max(img.width, img.height));
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
      profile.photo = dataUrl;
      renderPhoto();
      await fetch("/api/profile", { method: "PUT", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ photo: dataUrl }) });
      localStorage.setItem("vow-profile", JSON.stringify(profile));
    };
    img.src = URL.createObjectURL(file);
  };

  /* ---------- focus card ---------- */
  const AREA_HREF = { contracts: "/contracts", budget: "/budget", guests: "/guests", seating: "/seating" };
  const areaLabel = (a) => a ? a.charAt(0).toUpperCase() + a.slice(1) : "Home";
  let running = false;

  const doneKey = brief.exists ? "vow-focus-done:" + (brief.generated_at || "") : "";
  let doneState = {};
  try { doneState = JSON.parse(localStorage.getItem(doneKey) || "{}"); } catch (e) {}

  const prio = { high: 0, medium: 1, low: 2 };
  const items = brief.exists
    ? [...((brief.analysis || {}).action_items || [])].sort((a, b) => (prio[a.priority] ?? 3) - (prio[b.priority] ?? 3))
    : [];
  const focus = items.slice(0, 3);
  const later = items.slice(3, 6);
  const onTrack = brief.exists ? ((brief.analysis || {}).on_track || []) : [];

  const reviewedLine = () => {
    if (!brief.exists || !brief.generated_at) return "Vow hasn't reviewed your wedding yet — press Refresh for your first look.";
    const d = new Date(brief.generated_at);
    return `Vow reviewed your contracts, budget and guest list on ${d.toLocaleDateString("en-US", { month: "long", day: "numeric" })}.`;
  };

  const timeLabel = (iso) => {
    const d = new Date(iso), now = new Date();
    const days = Math.round((now.setHours(0,0,0,0) - new Date(d).setHours(0,0,0,0)) / 86400000);
    if (days <= 0) return "today";
    if (days === 1) return "yesterday";
    if (days < 7) return d.toLocaleDateString("en-US", { weekday: "long" });
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  };

  const STEP_DEFS = () => [
    ["Reading your contracts", `${overview.contract_count} document${overview.contract_count === 1 ? "" : "s"}`],
    ["Checking the budget", `${overview.budget.item_count} lines`],
    ["Reconciling RSVPs", `${overview.guests.household_count} households`],
    ["Double-checking the findings", "verifier"],
  ];

  function stepFromEvents(events) {
    let step = 0;
    for (const e of events) {
      const t = String(e).toLowerCase();
      if (t.includes("verifier") || t.includes("merg")) step = Math.max(step, 3);
      else if (t.includes("guests")) step = Math.max(step, 2);
      else if (t.includes("budget")) step = Math.max(step, 1);
    }
    return step;
  }

  function renderFocus(stepIdx) {
    const card = $("focus-card");
    if (isNew && !running) {
      card.innerHTML = `
        <h2 style="font-family:var(--serif);font-weight:500;font-size:1.35rem;margin:0">Let's begin gently</h2>
        <p class="focus-sub" style="margin:0.4rem 0 1.2rem">No pressure — three small first steps. Vow takes it from there.</p>
        <div>
          ${[
            ["Set a rough budget", "A ballpark is enough — you can change it any time.", "Budget", "/budget"],
            ["Start the guest list with the people who matter most", "Immediate family and best friends first — the rest follows.", "Guests", "/guests"],
            ["Tell Vow what kind of wedding you're dreaming of", "Garden party or grand ballroom? It shapes every suggestion Vow makes.", "✦ Chat", ""],
          ].map(([title, sub, area, href]) => `
            <div class="focus-row">
              <span class="later-circle"></span>
              <div class="focus-body" style="flex:1;min-width:0">
                <div class="focus-title">${title}</div>
                <div style="color:var(--ink-soft);font-size:0.85rem">${sub}</div>
              </div>
              ${href ? `<a class="area-link" style="margin-top:3px" href="${href}">${area} →</a>`
                     : `<span class="area-link" style="margin-top:3px">${area} →</span>`}
            </div>`).join("")}
        </div>
        <p style="color:var(--ink-faint);font-size:0.8rem;margin:1.2rem 0 0">Once there's something to look at, Vow reviews everything weekly and tells you the three things that matter.</p>`;
      return;
    }

    let body;
    if (running) {
      const steps = STEP_DEFS();
      body = `
        <div class="steps">
          <div class="steps-list">
            ${steps.map(([label, note], i) => `
              <div class="step-row ${stepIdx > i ? "done" : stepIdx === i ? "active" : ""}">
                <span class="step-dot"></span>
                <span class="label">${label}</span>
                <span class="note">${stepIdx > i ? "done" : note}</span>
              </div>`).join("")}
          </div>
          <p class="steps-caption">Usually 30–90 seconds. You can keep working — the list updates itself when Vow is done.</p>
        </div>`;
    } else {
      body = `
        <div>
          ${focus.map((f, i) => {
            const done = !!doneState[i];
            return `
            <div class="focus-row ${done ? "done" : ""}" data-idx="${i}">
              <button class="focus-check" title="Mark done">${done ? "✓" : ""}</button>
              <div class="focus-body" style="flex:1;min-width:0">
                <div class="focus-title">${esc(f.title)}</div>
                <details>
                  <summary>${esc(f.do || "")} <span style="color:var(--ink-faint)">— why?</span></summary>
                  <p>${esc(f.why || "")}</p>
                </details>
              </div>
              <a class="area-link" style="margin-top:3px" href="${AREA_HREF[f.area] || "/"}">${areaLabel(f.area)} →</a>
            </div>`;
          }).join("") || `<div class="focus-row" style="color:var(--ink-soft);font-size:0.9rem">Nothing yet — refresh to get your first brief.</div>`}
        </div>
        ${later.length ? `
        <details class="fold" style="border-top:1px solid var(--divider);padding-top:0.9rem;margin-top:0.2rem">
          <summary>${later.length} more, when you have time ▾</summary>
          <div>
            ${later.map((f) => `
              <div class="later-row">
                <span class="later-circle"></span>
                <div style="flex:1;min-width:0">
                  <div style="font-weight:600;font-size:0.94rem">${esc(f.title)}</div>
                  <div style="color:var(--ink-soft);font-size:0.85rem">${esc(f.do || f.why || "")}</div>
                </div>
                <a class="area-link" style="margin-top:3px" href="${AREA_HREF[f.area] || "/"}">${areaLabel(f.area)} →</a>
              </div>`).join("")}
          </div>
        </details>` : ""}
        ${onTrack.length ? `
        <div class="reassure">
          ${onTrack.map((t) => `<span class="chip-ok">✓ ${esc(t)}</span>`).join("")}
        </div>` : ""}
        ${(overview.activity || []).length ? `
        <div class="activity">
          ${overview.activity.map((a) => {
            const cls = profile && a.actor === profile.partner_b ? "rose" : "lavender";
            return `
            <div class="activity-row">
              <span class="avatar ${cls}">${esc((a.actor || "?").charAt(0).toUpperCase())}</span>
              <span><b>${esc(a.actor)}</b> ${esc(a.text)} · ${timeLabel(a.at)}</span>
            </div>`;
          }).join("")}
        </div>` : ""}`;
    }

    $("focus-card").innerHTML = `
      <div class="focus-head">
        <h2>This week, focus on three things</h2>
        <button class="btn secondary small" id="refresh-btn" ${running ? "disabled" : ""}>${running ? "✦ Reviewing…" : "✦ Refresh"}</button>
      </div>
      <p class="focus-sub">${reviewedLine()}</p>
      ${body}`;

    $("refresh-btn").onclick = refresh;
    document.querySelectorAll(".focus-row[data-idx] .focus-check").forEach((btn) => {
      btn.onclick = () => {
        const row = btn.closest(".focus-row");
        const i = row.dataset.idx;
        const wasDone = !!doneState[i];
        doneState[i] = !wasDone;
        if (doneKey) localStorage.setItem(doneKey, JSON.stringify(doneState));
        if (!wasDone) VOW.cheer();
        renderFocus();
      };
    });
  }

  async function refresh() {
    if (running) return;
    running = true;
    renderFocus(0);
    try {
      const res = await fetch("/api/weekly-brief/analyze", { method: "POST" });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Couldn't start the review.");
      await VOW.pollJob(data.job_id, (events) => renderFocus(stepFromEvents(events)));
      const fresh = await fetch("/api/weekly-brief/latest").then((r) => r.json());
      Object.assign(brief, fresh, { exists: true });
      items.length = 0;
      items.push(...[...((brief.analysis || {}).action_items || [])]
        .sort((a, b) => (prio[a.priority] ?? 3) - (prio[b.priority] ?? 3)));
      focus.length = 0; focus.push(...items.slice(0, 3));
      later.length = 0; later.push(...items.slice(3, 6));
      onTrack.length = 0; onTrack.push(...(((brief.analysis || {}).on_track) || []));
      doneState = {};
    } catch (e) {
      VOW.toast(e.message || "Something went wrong — try again.");
    }
    running = false;
    renderFocus();
  }

  renderFocus();

  /* ---------- at a glance ---------- */
  function glanceCol(href, label, stat, statusText, statusCls, empty) {
    return `
      <a href="${href}">
        <div class="eyebrow">${label}</div>
        <div class="stat ${empty ? "empty" : ""}">${stat}</div>
        <div class="status ${statusCls || ""}">${statusText}</div>
      </a>`;
  }

  const b = overview.budget, g = overview.guests, s = overview.seating;
  const over = b.committed - b.total_budget;
  const cols = [];
  if (b.total_budget > 0 || b.item_count > 0) {
    cols.push(glanceCol("/budget", "Budget", money(b.total_budget || b.committed),
      over > 0 ? `${money(over)} over committed` : `${money(-over)} under committed`,
      over > 0 ? "red" : ""));
  } else {
    cols.push(glanceCol("/budget", "Budget", "—", "set your first number", "rose", true));
  }
  if (g.household_count > 0) {
    cols.push(glanceCol("/guests", "Guests", `${g.confirmed_people} confirmed`,
      g.outstanding_households > 0 ? `${g.outstanding_households} households to chase` : "everyone has replied ✓"));
  } else {
    cols.push(glanceCol("/guests", "Guests", "—", "add your first household", "rose", true));
  }
  if (g.confirmed_people > 0 || s.table_count > 0) {
    const toSeat = Math.max(0, g.confirmed_people - s.seated_people);
    cols.push(glanceCol("/seating", "Seating", `${s.seated_people} seated`,
      toSeat > 0 ? `${toSeat} guests still to seat` : "everyone has a seat ✓"));
  } else {
    cols.push(glanceCol("/seating", "Seating", "—", "later — after RSVPs", "", true));
  }
  if (overview.contract_count > 0) {
    const red = ((overview.latest_contract || {}).flag_counts || {}).red || 0;
    cols.push(glanceCol("/contracts", "Contracts", `${overview.contract_count} reviewed`,
      red > 0 ? `${red} clause${red === 1 ? "" : "s"} to renegotiate` : "no open clauses",
      red > 0 ? "red" : ""));
  } else {
    cols.push(glanceCol("/contracts", "Contracts", "—", "upload as offers arrive", "", true));
  }
  $("glance").innerHTML = cols.join("");
})();
</script>
</body>
</html>
