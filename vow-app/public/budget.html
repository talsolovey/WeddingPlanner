<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vow — Budget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="app.js" defer></script>
<style>
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .stat { background: var(--bg-soft); border: 1px solid var(--line); border-radius: var(--radius); padding: 1rem 1.2rem; }
  .stat .label { font-size: .72rem; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-soft); }
  .stat .value { font-family: "Fraunces", serif; font-size: 1.5rem; color: var(--ink); }
  .stat.accent .value { color: var(--rose-deep); }
  table { width: 100%; border-collapse: collapse; font-size: .92rem; }
  th { text-align: left; font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-soft); padding: .5rem .6rem; border-bottom: 1px solid var(--line); }
  td { padding: .55rem .6rem; border-bottom: 1px solid var(--line); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .del { background: none; border: 0; color: var(--ink-soft); cursor: pointer; font-size: 1rem; }
  .del:hover { color: var(--sev-red); }
  .add-row .field { padding: .45rem .6rem; border-radius: 8px; font-size: .9rem; }
  .budget-input { display: flex; gap: .6rem; align-items: center; margin-bottom: 1.5rem; }
  .budget-input .field { max-width: 200px; }
  .delta-pos { color: var(--sev-red); } .delta-neg { color: var(--sev-green); }
</style>
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/">Vow <span class="logo-mark">✦</span></a>
    <nav class="nav">
      <a href="/">Home</a>
      <a href="/contracts">Contracts</a>
      <a href="/budget" class="active">Budget</a>
      <a class="soon">Vendors</a>
      <a class="soon">Weekly Brief</a>
    </nav>
  </header>

  <main class="page">
    <p class="eyebrow">Budget</p>
    <h1>Where the money goes.</h1>
    <p class="lede">Track every line, then ask Vow what this wedding will <em>actually</em> cost.</p>

    <div class="budget-input">
      <label for="total-budget" style="color: var(--ink-soft); font-size:.9rem;">Total budget</label>
      <input type="number" id="total-budget" class="field" min="0" step="100" placeholder="e.g. 40000">
      <button id="save-budget" class="btn-primary" style="padding:.55rem 1.2rem;">Save</button>
    </div>

    <div class="stats">
      <div class="stat"><div class="label">Budget</div><div class="value" id="stat-budget">—</div></div>
      <div class="stat"><div class="label">Committed</div><div class="value" id="stat-committed">—</div></div>
      <div class="stat"><div class="label">Paid so far</div><div class="value" id="stat-paid">—</div></div>
      <div class="stat accent"><div class="label">Vow's forecast</div><div class="value" id="stat-forecast">ask ↓</div></div>
    </div>

    <div class="card" style="overflow-x:auto;">
      <table>
        <thead>
          <tr><th>Category</th><th>Vendor</th><th class="num">Estimated</th><th class="num">Contracted</th><th class="num">Paid</th><th>Notes</th><th></th></tr>
        </thead>
        <tbody id="rows"></tbody>
        <tbody>
          <tr class="add-row">
            <td><input class="field" id="f-category" placeholder="Category"></td>
            <td><input class="field" id="f-vendor" placeholder="Vendor"></td>
            <td><input class="field" id="f-estimated" type="number" min="0" placeholder="0"></td>
            <td><input class="field" id="f-contracted" type="number" min="0" placeholder="0"></td>
            <td><input class="field" id="f-paid" type="number" min="0" placeholder="0"></td>
            <td><input class="field" id="f-notes" placeholder="Notes"></td>
            <td><button class="btn-primary" id="add" style="padding:.45rem 1rem;">Add</button></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div style="text-align:center; margin: 2rem 0 0;">
      <button id="analyze" class="btn-primary">Ask Vow to forecast</button>
    </div>

    <div id="status"></div>
    <div id="result"></div>
  </main>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
let CUR = "USD";
const fmt = (n) => new Intl.NumberFormat(undefined, { style: "currency", currency: CUR, maximumFractionDigits: 0 }).format(n || 0);

async function load() {
  const b = await (await fetch("/api/budget")).json();
  CUR = b.currency || "USD";
  $("total-budget").value = b.total_budget || "";
  const committed = b.items.reduce((s, i) => s + (i.contracted || i.estimated || 0), 0);
  const paid = b.items.reduce((s, i) => s + (i.paid || 0), 0);
  $("stat-budget").textContent = b.total_budget ? fmt(b.total_budget) : "—";
  $("stat-committed").textContent = fmt(committed);
  $("stat-paid").textContent = fmt(paid);
  if (!b.items.length) {
    $("rows").innerHTML = `<tr><td colspan="7" style="text-align:center; padding:1.4rem; color:var(--ink-soft);">
      No items yet — add your first line below, or
      <button id="sample" class="btn-primary" style="padding:.4rem 1rem; margin-left:.4rem;">load an example budget</button>
    </td></tr>`;
    return;
  }
  $("rows").innerHTML = b.items.map(i => `
    <tr>
      <td><b>${esc(i.category)}</b></td>
      <td>${esc(i.vendor)}</td>
      <td class="num">${i.estimated ? fmt(i.estimated) : "—"}</td>
      <td class="num">${i.contracted ? fmt(i.contracted) : "—"}</td>
      <td class="num">${i.paid ? fmt(i.paid) : "—"}</td>
      <td style="color:var(--ink-soft); font-size:.85rem;">${esc(i.notes)}</td>
      <td><button class="del" data-id="${i.id}" title="Remove">✕</button></td>
    </tr>`).join("");
  document.querySelectorAll(".del").forEach(el => el.addEventListener("click", async () => {
    const item = b.items.find(i => i.id === el.dataset.id);
    await fetch("/api/budget/items/" + el.dataset.id, { method: "DELETE" });
    load();
    toast(`Removed ${item ? item.category : "item"}`, { undo: async () => {
      await fetch("/api/budget/items", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(item),
      });
      load();
    }});
  }));
}

/* sample budget + enter-to-add */
document.addEventListener("click", async (e) => {
  if (e.target.id !== "sample") return;
  await fetch("/api/budget/load-sample", { method: "POST" });
  toast("Example budget loaded");
  load();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && e.target.id && e.target.id.startsWith("f-")) {
    e.preventDefault();
    $("add").click();
  }
});

$("save-budget").addEventListener("click", async () => {
  await fetch("/api/budget/settings", {
    method: "PUT", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ total_budget: $("total-budget").value || 0 }),
  });
  toast("Budget saved");
  load();
});

$("add").addEventListener("click", async () => {
  const body = {
    category: $("f-category").value, vendor: $("f-vendor").value,
    estimated: $("f-estimated").value, contracted: $("f-contracted").value,
    paid: $("f-paid").value, notes: $("f-notes").value,
  };
  if (!body.category.trim()) return;
  await fetch("/api/budget/items", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  ["f-category","f-vendor","f-estimated","f-contracted","f-paid","f-notes"].forEach(id => $(id).value = "");
  load();
});

$("analyze").addEventListener("click", async () => {
  $("analyze").disabled = true;
  $("result").innerHTML = "";
  try {
    const res = await fetch("/api/budget/analyze", { method: "POST" });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || "Analysis failed.");
    const result = await pollJob(json.job_id, $("status"), "Vow is going through your budget… usually 20–60 seconds.");
    $("status").innerHTML = "";
    render(result);
  } catch (err) {
    $("status").innerHTML = `<p class="status">⚠ ${esc(err.message)}</p>`;
  } finally {
    $("analyze").disabled = false;
  }
});

function render({ analysis: a, cost_usd }) {
  const delta = a.delta || (a.forecast_total - a.budget_total) || 0;
  $("stat-forecast").textContent = fmt(a.forecast_total);
  const warnings = (a.warnings || []).map(w => `
    <div class="flag ${esc(w.severity)}">
      <span class="chip ${esc(w.severity)}">${esc(w.severity)}</span>
      <div><b>${esc(w.category)}</b> — ${esc(w.issue)}</div>
      <div class="rec"><b>Do:</b> ${esc(w.recommendation)}</div>
    </div>`).join("") || "<p class='lede'>No warnings — looking healthy.</p>";
  const missing = (a.missing_categories || []).map(m => `<li>${esc(m)}</li>`).join("") || "<li>—</li>";
  $("result").innerHTML = `
    <div class="card" style="margin-top:1.5rem;">
      <p class="eyebrow" style="margin-bottom:.3rem">Forecast · confidence: ${esc(a.confidence)}</p>
      <h2>${fmt(a.forecast_total)} <span style="font-size:1rem;" class="${delta > 0 ? "delta-pos" : "delta-neg"}">${delta > 0 ? "+" : ""}${fmt(delta)} vs budget</span></h2>
      <p style="margin-top:.4rem">${esc(a.summary)}</p>
      <div class="meta">analysis cost $${cost_usd}</div>
    </div>
    <h2 class="section-title">Warnings</h2>
    <div class="flags-grid">${warnings}</div>
    <div class="two-col">
      <div><h2 class="section-title">Missing categories</h2><ul class="nice-list">${missing}</ul></div>
      <div><h2 class="section-title">Payment exposure</h2><p style="margin-top:.6rem">${esc(a.payment_exposure)}</p></div>
    </div>`;
}

load();
</script>
</body>
</html>
