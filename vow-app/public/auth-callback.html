<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vow ✦ — Signing you in</title>
<link rel="stylesheet" href="/vow.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh;
         background: #faf7f3; font-family: var(--sans, sans-serif); color: var(--ink, #26222a); }
  .box { text-align: center; }
</style>
</head>
<body data-chrome="none">
<div class="box">
  <p id="status">Signing you in…</p>
</div>
<script>
(async function () {
  // Supabase returns tokens in the URL fragment (never sent to any server).
  // We hand the access token to our backend, which verifies it with Supabase
  // before opening the session — a forged token can't become a session.
  const status = document.getElementById("status");
  const params = new URLSearchParams(location.hash.replace(/^#/, ""));
  const token = params.get("access_token");
  history.replaceState(null, "", "/auth/callback"); // scrub tokens from the URL
  if (!token) {
    status.textContent = params.get("error_description") || "Sign-in was cancelled.";
    setTimeout(() => (location.href = "/login"), 2500);
    return;
  }
  try {
    const res = await fetch("/api/auth/token", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ access_token: token }),
    });
    const body = await res.json();
    if (!res.ok) throw new Error(body.error || "Sign-in failed.");
    const profile = await fetch("/api/profile").then((r) => r.json()).catch(() => ({}));
    location.href = profile && profile.onboarded ? "/" : "/onboarding";
  } catch (e) {
    status.textContent = e.message;
    setTimeout(() => (location.href = "/login"), 2500);
  }
})();
</script>
</body>
</html>
