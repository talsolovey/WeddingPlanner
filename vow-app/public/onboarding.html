<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vow ✦ — Welcome</title>
<link rel="stylesheet" href="/vow.css">
<script src="/vow-shell.js"></script>
<style>
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2.5rem 1.2rem; min-height: 100vh; box-sizing: border-box;
    background: #faf7f3 radial-gradient(ellipse 80% 60% at 50% -10%, rgba(160,92,109,0.07), transparent);
  }
  .brand { font-family: var(--serif); font-size: 1.3rem; font-weight: 600; display: inline-flex; align-items: center; gap: 0.35rem; margin-bottom: 2rem; }
  main { width: 100%; max-width: 520px; background: var(--card); border: 1px solid var(--hairline); border-radius: 20px; padding: 2.6rem 2.6rem 2.2rem; box-sizing: border-box; box-shadow: 0 1px 3px rgba(38,34,42,0.05); }
  .dots { display: flex; gap: 0.4rem; margin-bottom: 2rem; }
  .dots span { flex: 1; height: 3px; border-radius: 999px; background: var(--divider); }
  .dots span.on { background: var(--rose); }
  .step { animation: vow-rise 0.4s ease both; }
  .step h1 { font-family: var(--serif); font-weight: 400; font-size: 1.9rem; line-height: 1.2; margin: 0; }
  .step .lede { color: var(--ink-soft); font-size: 0.9rem; margin: 0.6rem 0 1.6rem; }
  label.ob { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-soft); font-weight: 600; margin: 0 0 0.4rem; }
  label.ob .soft { color: var(--ink-faint); text-transform: none; letter-spacing: 0; }
  .ob-input { width: 100%; box-sizing: border-box; padding: 0.8rem 1rem; border: 1px solid var(--hairline); border-radius: 12px; font: inherit; font-size: 1rem; background: #fff; outline: none; color: var(--ink); }
  .ob-input:focus { border-color: var(--rose); }
  .photo-slot {
    width: 180px; height: 226px; display: block; margin: 0 auto; padding: 0; border: none;
    border-radius: 90px 90px 16px 16px; overflow: hidden; cursor: pointer; position: relative;
    box-shadow: 0 10px 30px -14px rgba(133,73,90,0.35); background: #f6f1ec;
  }
  .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-slot .ph {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    text-align: center; color: var(--ink-faint); font-size: 0.75rem; padding: 1.6rem;
    border: 1.5px dashed #ddd3ca; border-radius: 90px 90px 16px 16px; line-height: 1.5;
  }
  .prio-chip { border: 1px solid var(--hairline); background: var(--card); color: var(--ink); border-radius: 999px; padding: 0.5rem 1.1rem; font-size: 0.9rem; cursor: pointer; font-family: inherit; font-weight: 400; }
  .prio-chip.on { border-color: var(--rose); background: var(--rose-tint); color: var(--rose); font-weight: 600; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 2.2rem; }
  .back-btn { background: none; border: none; color: var(--ink-soft); font: inherit; font-size: 0.88rem; cursor: pointer; padding: 0; }
  .back-btn.hidden { color: transparent; pointer-events: none; }
  .continue-btn { background: var(--rose-deep); color: #fff; border: 0; border-radius: 999px; padding: 0.7rem 1.8rem; font: inherit; font-size: 0.92rem; font-weight: 600; cursor: pointer; }
  .continue-btn:hover { background: var(--rose); }
  .foot-note { color: var(--ink-faint); font-size: 0.78rem; margin-top: 1.6rem; }
</style>
</head>
<body data-chrome="none">
<div class="brand">Vow <span style="color:var(--rose);font-size:0.95rem">✦</span></div>
<main>
  <div class="dots" id="dots"></div>
  <div id="step"></div>
  <div class="nav-row" id="nav" hidden>
    <button class="back-btn" id="back">← Back</button>
    <button class="continue-btn" id="next">Continue</button>
  </div>
</main>
<p class="foot-note">About a minute — you can change all of this later.</p>

<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const esc = VOW.esc;

  const state = {
    step: 0, nameA: "", nameB: "", date: "", venue: "", photo: "",
    guests: 180, budget: 200000, picked: [],
  };
  const PRIORITIES = ["Food & wine", "Music & party", "Photography", "Flowers & decor",
    "The dress", "Guest experience", "Staying on budget", "Low stress"];
  const names = () => `${state.nameA || "Tal"} & ${state.nameB || "Omer"}`;

  function render() {
    $("dots").innerHTML = [0, 1, 2, 3, 4, 5].map((i) =>
      `<span class="${i <= state.step ? "on" : ""}"></span>`).join("");
    $("nav").hidden = state.step >= 5;
    $("back").classList.toggle("hidden", state.step === 0);

    const s = state.step;
    if (s === 0) {
      $("step").innerHTML = `
        <div class="step">
          <h1>First things first —<br>who's getting married?</h1>
          <p class="lede">Vow uses your names everywhere, so it always feels like <em>your</em> wedding.</p>
          <label class="ob">You</label>
          <input class="ob-input" id="in-a" placeholder="Tal" value="${esc(state.nameA)}" style="margin-bottom:1.1rem">
          <label class="ob">Your partner</label>
          <input class="ob-input" id="in-b" placeholder="Omer" value="${esc(state.nameB)}">
        </div>`;
      $("in-a").oninput = (e) => { state.nameA = e.target.value; };
      $("in-b").oninput = (e) => { state.nameB = e.target.value; };
      $("in-a").focus();
    } else if (s === 1) {
      $("step").innerHTML = `
        <div class="step">
          <h1>${esc(names())} — lovely.<br>When's the big day?</h1>
          <p class="lede">The countdown starts the moment you tell us. No date yet is fine too.</p>
          <label class="ob">Wedding date</label>
          <input type="date" class="ob-input" id="in-date" value="${esc(state.date)}" style="margin-bottom:1.1rem">
          <label class="ob">Venue <span class="soft">if you have one</span></label>
          <input class="ob-input" id="in-venue" placeholder="The Vineyard Pavilion" value="${esc(state.venue)}">
          <button class="btn tertiary" id="no-date" style="font-size:0.85rem;margin-top:0.8rem">We haven't picked a date yet →</button>
        </div>`;
      $("in-date").onchange = (e) => { state.date = e.target.value; };
      $("in-venue").oninput = (e) => { state.venue = e.target.value; };
      $("no-date").onclick = () => { state.date = ""; go(2); };
    } else if (s === 2) {
      $("step").innerHTML = `
        <div class="step" style="text-align:center">
          <h1>Put a face on it</h1>
          <p class="lede">Your favorite photo of the two of you greets you every time you open Vow.</p>
          <button class="photo-slot" id="photo-slot">
            ${state.photo ? `<img src="${state.photo}" alt="Your photo">` : `<span class="ph">drop a photo, or tap to browse</span>`}
          </button>
          <input type="file" id="photo-input" accept="image/*" hidden>
          <div><button class="btn tertiary" id="skip-photo" style="color:var(--ink-faint);font-size:0.82rem;margin-top:1rem">Maybe later</button></div>
        </div>`;
      const slot = $("photo-slot");
      slot.onclick = () => $("photo-input").click();
      slot.ondragover = (e) => e.preventDefault();
      slot.ondrop = (e) => { e.preventDefault(); handlePhoto(e.dataTransfer.files[0]); };
      $("photo-input").onchange = (e) => handlePhoto(e.target.files[0]);
      $("skip-photo").onclick = () => go(3);
    } else if (s === 3) {
      $("step").innerHTML = `
        <div class="step">
          <h1>Roughly how big?</h1>
          <p class="lede">Ballpark is perfect — Vow refines these as real numbers come in.</p>
          <label class="ob">Guests · <span style="color:var(--rose)" id="g-label">${state.guests}</span></label>
          <input type="range" class="vow-range" id="in-guests" min="20" max="500" step="10" value="${state.guests}" style="margin-bottom:1.4rem">
          <label class="ob">Budget · <span style="color:var(--rose)" id="b-label">$${state.budget.toLocaleString()}</span></label>
          <input type="range" class="vow-range" id="in-budget" min="10000" max="500000" step="5000" value="${state.budget}">
          <p style="color:var(--ink-faint);font-size:0.8rem;margin:1.2rem 0 0">Only the two of you can see this.</p>
        </div>`;
      $("in-guests").oninput = (e) => { state.guests = +e.target.value; $("g-label").textContent = state.guests; };
      $("in-budget").oninput = (e) => { state.budget = +e.target.value; $("b-label").textContent = "$" + state.budget.toLocaleString(); };
    } else if (s === 4) {
      $("step").innerHTML = `
        <div class="step">
          <h1>What matters most to you two?</h1>
          <p class="lede">Pick up to three. Vow protects these in the budget and flags anything that threatens them.</p>
          <div style="display:flex;flex-wrap:wrap;gap:0.5rem">
            ${PRIORITIES.map((label) => `
              <button class="prio-chip ${state.picked.includes(label) ? "on" : ""}" data-p="${esc(label)}">${esc(label)}</button>`).join("")}
          </div>
        </div>`;
      document.querySelectorAll(".prio-chip").forEach((btn) => {
        btn.onclick = () => {
          const label = btn.dataset.p;
          if (state.picked.includes(label)) state.picked = state.picked.filter((p) => p !== label);
          else if (state.picked.length < 3) state.picked.push(label);
          render();
        };
      });
    } else {
      $("step").innerHTML = `
        <div class="step" style="text-align:center">
          <div style="color:var(--rose);font-size:1.2rem;margin-bottom:1rem">✦</div>
          <h1 style="font-size:2rem">${esc(names())},<br>your planning home is ready.</h1>
          <p class="lede" style="max-width:36ch;margin:1rem auto 0">Vow set up your budget, guest list and countdown. It will quietly keep watch and tell you the three things that matter each week.</p>
          <a href="/" class="continue-btn" style="display:inline-block;margin-top:1.8rem;padding:0.85rem 2.2rem;text-decoration:none">See your home →</a>
        </div>`;
    }
  }

  function handlePhoto(file) {
    if (!file) return;
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, 600 / Math.max(img.width, img.height));
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      state.photo = canvas.toDataURL("image/jpeg", 0.85);
      render();
    };
    img.src = URL.createObjectURL(file);
  }

  async function persist() {
    const body = {
      partner_a: state.nameA || "Tal",
      partner_b: state.nameB || "Omer",
      wedding_date: state.date,
      venue: state.venue,
      photo: state.photo,
      guests_estimate: state.guests,
      budget_estimate: state.budget,
      priorities: state.picked,
      onboarded: true,
    };
    try {
      const res = await fetch("/api/profile", { method: "PUT",
        headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      if (res.ok) localStorage.setItem("vow-profile", JSON.stringify(await res.json()));
    } catch (e) { /* home falls back gracefully */ }
  }

  function go(step) {
    state.step = Math.max(0, Math.min(5, step));
    if (state.step === 5) persist();
    render();
  }

  $("back").onclick = () => go(state.step - 1);
  $("next").onclick = () => go(state.step + 1);
  render();
})();
</script>
</body>
</html>
