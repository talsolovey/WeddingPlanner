<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vow ✦ — Guests</title>
<link rel="stylesheet" href="/vow.css">
<script src="/vow-shell.js"></script>
<style>
  main { width: 100%; max-width: 960px; margin: 0 auto; padding: 3rem 1.5rem 4rem; flex: 1; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }

  .summary-card { background: var(--card); border: 1px solid var(--hairline); border-radius: 16px; padding: 1.5rem 1.8rem; margin-top: 1.8rem; box-shadow: var(--card-shadow); }
  .summary-row { display: flex; gap: 2.5rem; flex-wrap: wrap; align-items: baseline; }
  .summary-stat { font-family: var(--serif); font-size: 1.9rem; }
  .vows-read { margin-left: auto; text-align: right; }
  .vows-read .label { text-transform: uppercase; letter-spacing: 0.14em; font-size: 0.66rem; font-weight: 600; color: var(--rose); }
  .vows-read .text { font-size: 0.88rem; max-width: 26ch; }
  .capacity-bar { height: 6px; border-radius: 999px; background: var(--divider); overflow: hidden; display: flex; margin-top: 1.2rem; }
  .bar-legend { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--ink-soft); margin-top: 0.4rem; }

  .filter-row { display: flex; flex-wrap: wrap; align-items: center; gap: 0.4rem; margin: 1.6rem 0 0.8rem; }
  .filter-chip { border: 1px solid var(--hairline); background: var(--card); color: var(--ink); border-radius: 999px; padding: 0.3rem 0.9rem; font-size: 0.82rem; cursor: pointer; font-family: inherit; }
  .filter-chip .n { opacity: 0.55; }
  .filter-chip.on { border-color: var(--rose); background: var(--rose-tint); color: var(--rose); font-weight: 600; }
  .search { margin-left: auto; max-width: 200px; padding: 0.45rem 0.9rem; border: 1px solid var(--hairline); border-radius: 999px; font: inherit; font-size: 0.85rem; color: var(--ink); background: var(--card); outline: none; }
  .search:focus { border-color: var(--rose); }

  .table-card { background: var(--card); border: 1px solid var(--hairline); border-radius: 16px; box-shadow: var(--card-shadow); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th { text-align: left; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-soft); font-weight: 600; padding: 0.9rem 1rem 0.6rem; border-bottom: 1px solid var(--hairline); }
  th:first-child { padding-left: 1.8rem; }
  th:last-child { padding-right: 1.8rem; }
  td { padding: 0.65rem 1rem; border-bottom: 1px solid var(--divider); }
  td:first-child { padding-left: 1.8rem; }
  td:last-child { padding-right: 1.8rem; }
  tbody tr:hover { background: var(--bg); }
  .hh-name { font-weight: 600; }
  .hh-note { color: var(--amber); font-size: 0.78rem; }
  .group-cell { color: var(--ink-soft); font-size: 0.85rem; }
  .coming-cell { text-align: right; font-variant-numeric: tabular-nums; }
  .rsvp-cell { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; }
  .invite-cell { text-align: right; }
  .nudge-btn { background: none; border: 1px solid var(--rose-tint-border); color: var(--rose); border-radius: 999px; padding: 0.2rem 0.8rem; font: inherit; font-size: 0.78rem; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .nudge-btn:hover { background: var(--rose-tint); }
  .sent-mark { font-size: 0.78rem; color: var(--ink-faint); }
  .row-del { background: none; border: none; color: var(--ink-faint); font-size: 0.8rem; cursor: pointer; opacity: 0; padding: 0 0 0 0.5rem; }
  tbody tr:hover .row-del { opacity: 1; }
  .add-line { background: none; border: none; color: var(--rose); font: inherit; font-size: 0.88rem; font-weight: 500; cursor: pointer; padding: 0; }
  .add-form input, .add-form select { padding: 0.45rem 0.7rem; border: 1px solid var(--hairline); border-radius: 10px; font: inherit; font-size: 0.85rem; width: 100%; background: #fff; outline: none; }
  .add-form input:focus { border-color: var(--rose); }

  .headcount-card { border: 1px solid var(--rose-tint-border); background: var(--rose-tint); border-radius: 16px; padding: 1.4rem 1.8rem; margin-top: 1.4rem; }
  .hc-eyebrow { color: var(--rose); font-size: 0.8rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; }
  .hc-total { font-family: var(--serif); font-size: 1.6rem; margin-top: 0.4rem; }
  .hc-sub { font-size: 0.95rem; font-family: var(--sans); color: var(--ink-soft); }
  .rec-row { display: flex; gap: 0.7rem; align-items: baseline; font-size: 0.9rem; }
  .rec-row .dot { position: relative; top: -2px; }
  .thinking-line { color: var(--rose); font-size: 0.88rem; animation: vow-pulse 1.2s ease-in-out infinite; margin-top: 0.6rem; }
  /* mobile: rows collapse to name + status + nudge (per the mobile reference) */
  @media (max-width: 640px) {
    th:nth-child(2), td:nth-child(2), th:nth-child(3), td:nth-child(3) { display: none; }
    .summary-row { gap: 1.4rem; }
  }
</style>
</head>
<body data-page="guests">
<main>
  <div class="page-head">
    <div>
      <h1 class="page-title">Guests</h1>
      <p class="page-sub" style="margin-top:0.3rem">RSVPs, invites and the real headcount.</p>
    </div>
    <div style="display:flex;gap:0.6rem">
      <a class="btn secondary" href="/invitations">Invites &amp; reminders →</a>
      <button class="btn primary" id="project-btn">✦ Project headcount</button>
    </div>
  </div>

  <section class="summary-card" id="summary"></section>
  <div class="filter-row" id="filters"></div>
  <section class="table-card"><table id="guest-table"></table></section>
  <section class="headcount-card" id="headcount" hidden></section>
</main>

<script>
(async function () {
  const $ = (id) => document.getElementById(id);
  const esc = VOW.esc, money = VOW.money;

  let guests, headcount, links = {};
  let filter = "All", q = "", adding = false;

  const RSVP_LABEL = { confirmed: "confirmed", pending: "pending", no_response: "no reply", declined: "declined" };
  const RSVP_COLOR = { confirmed: "var(--green)", pending: "var(--amber)", no_response: "var(--red)", declined: "var(--ink-faint)" };
  const CHASE = (h) => ["pending", "no_response"].includes(h.rsvp);

  async function load() {
    const [g, hc, lk, profile] = await Promise.all([
      fetch("/api/guests").then((r) => r.json()),
      fetch("/api/guests/headcount/latest").then((r) => r.json()).catch(() => ({ exists: false })),
      fetch("/api/guests/rsvp-links", { method: "POST" }).then((r) => r.json()).catch(() => ({ links: [] })),
      VOW.loadProfile(),
    ]);
    guests = g; headcount = hc;
    links = Object.fromEntries((lk.links || []).map((l) => [l.id, l.url]));
    window._profile = profile;
  }

  const households = () => guests.households || [];
  const stats = () => {
    const hs = households();
    const confirmed = hs.reduce((s, h) => s + (h.rsvp === "confirmed" ? (h.attending_count || 0) : 0), 0);
    const invited = hs.reduce((s, h) => s + (h.party_size || 0), 0);
    const awaiting = hs.filter(CHASE).length;
    const outstanding = hs.reduce((s, h) => s + (CHASE(h) ? (h.party_size || 0) : 0), 0);
    const likelyExtra = Math.round(outstanding * 0.75);
    return { confirmed, invited, awaiting, outstanding, likelyExtra, likely: confirmed + likelyExtra };
  };

  /* ---------- summary ---------- */
  function renderSummary() {
    const s = stats();
    const cap = guests.settings.venue_capacity || 0;
    const denom = Math.max(cap, s.likely, 1);
    const read = !cap
      ? `Likely <b>${s.likely} guests</b> — set your venue capacity to check the fit.`
      : s.likely <= cap
        ? `Likely <b>${s.likely} guests</b> — comfortably inside the venue's ${cap}.`
        : `Likely <b>${s.likely} guests</b> — over the venue's ${cap}. Time to trim or talk to the venue.`;
    $("summary").innerHTML = `
      <div class="summary-row">
        <div>
          <div class="eyebrow">Confirmed</div>
          <div class="summary-stat">${s.confirmed}</div>
        </div>
        <div>
          <div class="eyebrow">Invited</div>
          <div class="summary-stat" style="color:var(--ink-soft)">${s.invited}</div>
        </div>
        <div>
          <div class="eyebrow">Awaiting reply</div>
          <div class="summary-stat" style="color:var(--amber)">${s.awaiting} <span style="font-size:0.95rem;color:var(--ink-soft);font-family:var(--sans)">households</span></div>
        </div>
        <div class="vows-read">
          <div class="label">Vow's read</div>
          <div class="text">${read}</div>
        </div>
      </div>
      <div>
        <div class="capacity-bar">
          <div style="width:${(s.confirmed / denom) * 100}%;background:var(--rose-deep)"></div>
          <div style="width:${(s.likelyExtra / denom) * 100}%;background:var(--rose-tint-border)"></div>
        </div>
        <div class="bar-legend">
          <span>${s.confirmed} confirmed + ${s.likelyExtra} likely from pending replies</span>
          <span>${cap ? `venue holds ${cap}` : "venue capacity not set"}</span>
        </div>
      </div>`;
  }

  /* ---------- filters ---------- */
  const FILTERS = ["All", "Confirmed", "Pending", "No reply", "Declined"];
  const KEY = { Confirmed: "confirmed", Pending: "pending", "No reply": "no_response", Declined: "declined" };

  function renderFilters() {
    const hs = households();
    const count = (label) => label === "All" ? hs.length : hs.filter((h) => h.rsvp === KEY[label]).length;
    $("filters").innerHTML = FILTERS.map((label) => `
      <button class="filter-chip ${filter === label ? "on" : ""}" data-f="${label}">${label} <span class="n">${count(label)}</span></button>`).join("") +
      `<input class="search" id="search" placeholder="Search…" value="${esc(q)}">`;
    document.querySelectorAll(".filter-chip").forEach((btn) => {
      btn.onclick = () => { filter = btn.dataset.f; renderFilters(); renderTable(); };
    });
    const search = $("search");
    search.oninput = (e) => { q = e.target.value.toLowerCase(); renderTable(); };
  }

  /* ---------- table ---------- */
  const noteFor = (h) => {
    const deadline = guests.settings.rsvp_deadline;
    const past = deadline && new Date() > new Date(deadline + "T23:59:59");
    if (h.rsvp === "no_response" && past) return "past the RSVP deadline";
    if (h.rsvp === "confirmed" && h.plus_one_allowed && !h.plus_one_name) return "plus-one still unnamed";
    return "";
  };
  const groupFor = (h) => {
    if (h.group) return h.group;
    const p = window._profile || {};
    const name = h.side === "partner_b" ? (p.partner_b || "partner") : (p.partner_a || "partner");
    return `Family — ${name}`;
  };
  const orderKey = (h) => h.rsvp === "no_response" ? 0 : h.rsvp === "pending" ? 1 : h.rsvp === "confirmed" ? 2 : 3;

  function renderTable() {
    const rows = households()
      .filter((h) => (filter === "All" || h.rsvp === KEY[filter]) &&
        (!q || h.household.toLowerCase().includes(q) || groupFor(h).toLowerCase().includes(q)))
      .sort((a, b) => orderKey(a) - orderKey(b) ||
        (b.rsvp === "confirmed" ? (b.attending_count || 0) - (a.attending_count || 0)
                                : (b.party_size || 0) - (a.party_size || 0)));
    $("guest-table").innerHTML = `
      <thead>
        <tr>
          <th>Household</th><th>Group</th><th style="text-align:right">Coming</th><th>RSVP</th><th style="text-align:right">Invite</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map((h) => {
          const note = noteFor(h);
          const coming = h.rsvp === "declined" ? "—" : (h.rsvp === "confirmed" ? (h.attending_count || 0) : (h.party_size || 0));
          return `
          <tr data-id="${h.id}">
            <td>
              <div class="hh-name">${esc(h.household)}</div>
              ${note ? `<div class="hh-note">${esc(note)}</div>` : ""}
            </td>
            <td class="group-cell">${esc(groupFor(h))}</td>
            <td class="coming-cell">${coming}</td>
            <td>
              <span class="rsvp-cell" style="color:${RSVP_COLOR[h.rsvp]}">
                <span class="dot" style="background:${RSVP_COLOR[h.rsvp]}"></span>${RSVP_LABEL[h.rsvp] || h.rsvp}
              </span>
            </td>
            <td class="invite-cell">
              ${CHASE(h) ? `<button class="nudge-btn">Nudge on WhatsApp</button>`
                         : h.invite_sent ? `<span class="sent-mark">sent ✓</span>` : ""}
              <button class="row-del" title="Remove household">✕</button>
            </td>
          </tr>`;
        }).join("")}
        ${adding ? `
        <tr class="add-form">
          <td><input id="nh-name" placeholder="Household name"></td>
          <td><input id="nh-group" placeholder="Group (optional)"></td>
          <td><input id="nh-size" type="number" min="1" value="2" style="max-width:70px;text-align:right"></td>
          <td><input id="nh-phone" placeholder="Phone (for WhatsApp)"></td>
          <td style="white-space:nowrap;text-align:right">
            <button class="btn tertiary" id="nh-save">Save</button>
            <button class="btn tertiary" id="nh-cancel" style="margin-left:0.4rem;color:var(--ink-faint)">✕</button>
          </td>
        </tr>` : `
        <tr><td colspan="5" style="padding:0.8rem 1.8rem"><button class="add-line" id="add-hh">+ Add a household</button></td></tr>`}
      </tbody>`;

    document.querySelectorAll(".nudge-btn").forEach((btn) => {
      btn.onclick = () => nudge(btn.closest("tr").dataset.id);
    });
    document.querySelectorAll(".row-del").forEach((btn) => {
      btn.onclick = async () => {
        const tr = btn.closest("tr");
        const name = tr.querySelector(".hh-name").textContent;
        if (!confirm(`Remove ${name} from the guest list?`)) return;
        await fetch("/api/guests/households/" + tr.dataset.id, { method: "DELETE" });
        await load(); renderAll();
      };
    });
    if (adding) {
      $("nh-save").onclick = async () => {
        const body = {
          household: $("nh-name").value.trim(),
          group: $("nh-group").value.trim(),
          party_size: +$("nh-size").value || 1,
          phone: $("nh-phone").value.trim(),
        };
        if (!body.household) { VOW.toast("Give the household a name"); return; }
        const res = await fetch("/api/guests/households", { method: "POST",
          headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
        if (res.ok) { adding = false; await load(); renderAll(); VOW.toast("Added to the list ✦"); }
      };
      $("nh-cancel").onclick = () => { adding = false; renderTable(); };
      $("nh-name").focus();
    } else {
      $("add-hh").onclick = () => { adding = true; renderTable(); };
    }
  }

  /* ---------- WhatsApp nudge ----------
     Server-first: /api/guests/<id>/nudge sends the reminder through Twilio's
     WhatsApp API (message + magic link are built server-side). When Twilio
     isn't configured or the guest hasn't joined the sandbox, the server
     returns a wa.me URL and we fall back to click-to-chat. */
  async function nudge(id) {
    const h = households().find((x) => x.id === id);
    if (!h) return;
    const p = window._profile || {};
    try {
      const res = await fetch(`/api/guests/${id}/nudge`, { method: "POST" });
      const body = await res.json();
      if (res.ok && body.sent) {
        VOW.toast(`Sent to the ${h.household} on WhatsApp ✓`);
        return;
      }
      if (body.wa_url) {
        window.open(body.wa_url, "_blank");
        fetch("/api/activity", { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ actor: p.partner_a || "You", text: `nudged the ${h.household} on WhatsApp` }) });
        VOW.toast(body.reason === "recipient_not_in_sandbox"
          ? "They haven't joined the test sandbox — opening WhatsApp instead ✦"
          : "Nudge ready in WhatsApp ✦");
        return;
      }
      VOW.toast(body.error || "Couldn't send the nudge.");
    } catch (e) {
      VOW.toast("Couldn't send the nudge — check your connection.");
    }
  }

  /* ---------- headcount card ---------- */
  let projecting = false;
  const SEV_COLOR = { red: "var(--red)", yellow: "var(--amber)", green: "var(--green)" };

  function renderHeadcount() {
    const card = $("headcount");
    if (projecting) {
      card.hidden = false;
      card.innerHTML = `
        <span class="hc-eyebrow">✦ Vow's headcount check</span>
        <div class="thinking-line">✦ Reconciling RSVPs against the venue and catering budget — usually 20–60 seconds.</div>`;
      return;
    }
    if (!headcount || !headcount.exists) { card.hidden = true; return; }
    const a = headcount.analysis || {};
    const hc = a.headcount || {}, cat = a.catering_cost || {};
    const when = headcount.generated_at
      ? new Date(headcount.generated_at).toLocaleDateString("en-US", { month: "long", day: "numeric" }) : "";
    card.hidden = false;
    card.innerHTML = `
      <div style="display:flex;align-items:baseline;gap:0.6rem;flex-wrap:wrap">
        <span class="hc-eyebrow">✦ Vow's headcount check</span>
        <span style="color:var(--ink-faint);font-size:0.75rem">${when}</span>
      </div>
      <div class="hc-total">Plan for ${hc.likely_projection || "—"}
        <span class="hc-sub">floor ${hc.confirmed_floor || 0} · ceiling ${hc.worst_case_ceiling || 0} · catering ≈ ${money(cat.at_likely || 0)}</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:0.5rem;margin-top:0.9rem">
        ${(a.warnings || []).slice(0, 3).map((w) => `
          <div class="rec-row">
            <span class="dot" style="background:${SEV_COLOR[w.severity] || "var(--amber)"}"></span>
            <span><b>${esc(w.recommendation || w.issue || "")}</b> — ${esc(w.detail || "")}</span>
          </div>`).join("")}
      </div>
      <details class="fold" style="margin-top:0.8rem">
        <summary>How Vow got here ▾</summary>
        <p style="color:var(--ink-soft);font-size:0.85rem;margin:0.5rem 0 0;max-width:64ch">${esc(hc.assumptions || "")} ${esc(cat.note || "")}</p>
      </details>`;
  }

  $("project-btn").onclick = async () => {
    if (projecting) return;
    projecting = true;
    $("project-btn").disabled = true;
    $("project-btn").textContent = "✦ Projecting…";
    renderHeadcount();
    $("headcount").scrollIntoView({ behavior: "smooth", block: "center" });
    try {
      const res = await fetch("/api/guests/analyze", { method: "POST" });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Couldn't start the projection.");
      await VOW.pollJob(data.job_id);
      headcount = await fetch("/api/guests/headcount/latest").then((r) => r.json());
    } catch (e) {
      VOW.toast(e.message || "Something went wrong — try again.");
    }
    projecting = false;
    $("project-btn").disabled = false;
    $("project-btn").textContent = "✦ Project headcount";
    renderHeadcount();
  };

  function renderAll() { renderSummary(); renderFilters(); renderTable(); renderHeadcount(); }
  await load();
  renderAll();
})();
</script>
</body>
</html>
