<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vow ✦ — Contracts</title>
<link rel="stylesheet" href="/vow.css">
<script src="/vow-shell.js"></script>
<style>
  main { width: 100%; max-width: 880px; margin: 0 auto; padding: 3rem 1.5rem 4rem; flex: 1; }

  .drop-card {
    background: var(--card); border: 1.5px dashed #ddd3ca; border-radius: 16px;
    padding: 1.6rem 1.8rem; margin-top: 1.8rem; display: flex; align-items: center;
    gap: 1.2rem; flex-wrap: wrap; cursor: pointer;
  }
  .drop-card:hover, .drop-card.over { border-color: var(--rose); }
  .drop-title { font-weight: 600; font-size: 0.95rem; }
  .drop-sub { color: var(--ink-soft); font-size: 0.85rem; }
  .vendor-ask { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
  .vendor-ask input { padding: 0.55rem 0.9rem; border: 1px solid var(--hairline); border-radius: 10px; font: inherit; font-size: 0.88rem; background: #fff; outline: none; }
  .vendor-ask input:focus { border-color: var(--rose); }
  .thinking-line { color: var(--rose); font-size: 0.88rem; animation: vow-pulse 1.2s ease-in-out infinite; }

  .report { background: var(--card); border: 1px solid var(--hairline); border-radius: 16px; margin-top: 1.4rem; box-shadow: var(--card-shadow); overflow: hidden; }
  .report-head { padding: 1.6rem 1.8rem 1.3rem; border-bottom: 1px solid var(--divider); }
  .report-head h2 { font-family: var(--serif); font-weight: 500; font-size: 1.5rem; margin: 0.2rem 0 0; }
  .report-head .summary { color: var(--ink-soft); font-size: 0.9rem; margin: 0.7rem 0 0; max-width: 66ch; }
  .verdict-chip { display: inline-flex; align-items: center; gap: 0.45rem; border-radius: 999px; padding: 0.3rem 0.9rem; font-size: 0.82rem; font-weight: 500; }
  .verdict-chip.red { border: 1px solid var(--red-border); background: var(--red-tint); color: var(--red); }
  .verdict-chip.amber { border: 1px solid var(--amber-border); background: var(--amber-tint); color: var(--amber); }
  .verdict-chip.green { border: 1px solid var(--green-border); background: var(--green-tint); color: var(--green); }
  .report-section { padding: 1.3rem 1.8rem; border-bottom: 1px solid var(--divider); }
  .issue-row { display: flex; gap: 0.8rem; align-items: flex-start; }
  .issue-dot { flex: none; width: 8px; height: 8px; border-radius: 50%; margin-top: 0.5rem; }
  .issue-title { font-weight: 600; font-size: 0.95rem; }
  .issue-detail { color: var(--ink-soft); font-size: 0.88rem; margin-top: 0.15rem; }
  .clause-fold summary { list-style: none; cursor: pointer; color: var(--ink-faint); font-size: 0.8rem; }
  .clause-fold summary::-webkit-details-marker { display: none; }
  .clause-fold p { font-style: italic; color: var(--ink-soft); font-size: 0.85rem; margin: 0.3rem 0 0; border-left: 2px solid var(--hairline); padding-left: 0.8rem; }
  .report-footer { padding: 1.3rem 1.8rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem 2.5rem; }
  .report-footer h3 { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-soft); margin: 0 0 0.5rem; }
  .copy-btn { background: none; border: none; color: var(--rose); font-size: 0.78rem; cursor: pointer; font-family: inherit; padding: 0; }
  .report-footer ul { margin: 0; padding-left: 1.1rem; font-size: 0.88rem; color: var(--ink); }
  .report-footer li { margin: 0.25rem 0; }
  .report-del { float: right; background: none; border: none; color: var(--ink-faint); cursor: pointer; font-size: 0.85rem; padding: 0.2rem; opacity: 0; }
  .report:hover .report-del { opacity: 1; }
  .disclaimer { color: var(--ink-faint); font-size: 0.8rem; margin-top: 1rem; text-align: center; }
  @media (max-width: 640px) { .report-footer { grid-template-columns: 1fr; } }
</style>
</head>
<body data-page="contracts">
<main>
  <div>
    <h1 class="page-title">Contracts</h1>
    <p class="page-sub" style="margin-top:0.3rem">Vow reads the fine print before you sign.</p>
  </div>

  <section class="drop-card" id="drop"></section>
  <div id="reports"></div>
  <p class="disclaimer" id="disclaimer" hidden>Vow isn't a lawyer — for big commitments, have a professional take a look too.</p>
</main>

<script>
(async function () {
  const $ = (id) => document.getElementById(id);
  const esc = VOW.esc;

  let contracts = [];
  let pendingFile = null, analyzing = false;
  let fileInput;

  async function load() {
    contracts = await fetch("/api/contracts").then((r) => r.json());
  }

  /* ---------- drop card ---------- */
  function renderDrop() {
    const drop = $("drop");
    if (analyzing) {
      drop.innerHTML = `<div class="thinking-line">✦ Reading the fine print — usually 20–60 seconds. You can keep working, the report appears here.</div>`;
      return;
    }
    if (pendingFile) {
      drop.innerHTML = `
        <div style="flex:1;min-width:220px">
          <div class="drop-title">${esc(pendingFile.name)}</div>
          <div class="drop-sub">Who is this contract from?</div>
        </div>
        <div class="vendor-ask">
          <input id="vendor-name" placeholder="Vendor name">
          <button class="btn primary" id="go-review">✦ Review it</button>
          <button class="btn tertiary" id="cancel-file" style="color:var(--ink-faint)">✕</button>
        </div>`;
      $("go-review").onclick = (e) => { e.stopPropagation(); analyze(); };
      $("cancel-file").onclick = (e) => { e.stopPropagation(); pendingFile = null; renderDrop(); };
      $("vendor-name").onclick = (e) => e.stopPropagation();
      $("vendor-name").onkeydown = (e) => { if (e.key === "Enter") analyze(); };
      $("vendor-name").focus();
      return;
    }
    drop.innerHTML = `
      <div style="flex:1;min-width:220px">
        <div class="drop-title">Drop a vendor contract here</div>
        <div class="drop-sub">PDF — Vow flags hidden fees, cancellation traps and what to ask before signing.</div>
      </div>
      <button class="btn primary" style="flex:none">✦ Review a contract</button>`;
  }

  fileInput = document.createElement("input");
  fileInput.type = "file";
  fileInput.accept = "application/pdf";
  fileInput.onchange = () => {
    if (fileInput.files[0]) { pendingFile = fileInput.files[0]; renderDrop(); }
    fileInput.value = "";
  };

  $("drop").onclick = () => { if (!pendingFile && !analyzing) fileInput.click(); };
  $("drop").ondragover = (e) => { e.preventDefault(); $("drop").classList.add("over"); };
  $("drop").ondragleave = () => $("drop").classList.remove("over");
  $("drop").ondrop = (e) => {
    e.preventDefault();
    $("drop").classList.remove("over");
    const f = e.dataTransfer.files[0];
    if (f && f.name.toLowerCase().endsWith(".pdf")) { pendingFile = f; renderDrop(); }
    else VOW.toast("PDF files only, please");
  };

  async function analyze() {
    const vendor = $("vendor-name").value.trim();
    if (!vendor) { VOW.toast("Tell Vow who the vendor is"); return; }
    const form = new FormData();
    form.append("file", pendingFile);
    form.append("vendor", vendor);
    pendingFile = null;
    analyzing = true;
    renderDrop();
    try {
      const res = await fetch("/api/contracts/analyze", { method: "POST", body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Couldn't read that PDF.");
      await VOW.pollJob(data.job_id);
      await load();
      VOW.toast("The report is ready ✦");
    } catch (e) {
      VOW.toast(e.message || "Something went wrong — try again.");
    }
    analyzing = false;
    renderDrop();
    renderReports();
  }

  /* ---------- report cards ---------- */
  const displayVendor = (v) => (v || "").split(" - ")[0].trim();

  function issueRow(f, withClause) {
    const color = f.severity === "red" ? "var(--red)" : f.severity === "green" ? "var(--green)" : "var(--amber)";
    return `
      <div class="issue-row">
        <span class="issue-dot" style="background:${color}"></span>
        <div style="flex:1">
          <div class="issue-title">${esc(f.recommendation || f.issue || "")}</div>
          <div class="issue-detail">${esc(f.issue || "")}</div>
          ${withClause && f.clause ? `
          <details class="clause-fold" style="margin-top:0.3rem">
            <summary>the clause ▾</summary>
            <p>“${esc(f.clause)}”</p>
          </details>` : ""}
        </div>
      </div>`;
  }

  function renderReports() {
    const list = [...contracts].reverse();
    $("disclaimer").hidden = list.length === 0;
    $("reports").innerHTML = list.map((c) => {
      const a = c.analysis || {};
      const flags = a.red_flags || [];
      const reds = flags.filter((f) => f.severity === "red");
      const ambers = flags.filter((f) => f.severity !== "red");
      const chip = reds.length
        ? `<span class="verdict-chip red">${reds.length} clause${reds.length === 1 ? "" : "s"} to fix before signing</span>`
        : ambers.length
          ? `<span class="verdict-chip amber">${ambers.length} thing${ambers.length === 1 ? "" : "s"} to ask about</span>`
          : `<span class="verdict-chip green">✓ nothing alarming</span>`;
      const when = c.uploaded_at
        ? new Date(c.uploaded_at).toLocaleDateString("en-US", { month: "long", day: "numeric" }) : "";
      const vtype = a.vendor_type ? a.vendor_type.charAt(0).toUpperCase() + a.vendor_type.slice(1) : "Contract";
      const askWho = a.vendor_type ? `the ${a.vendor_type}` : "the vendor";
      return `
      <section class="report" data-id="${c.id}">
        <div class="report-head">
          <button class="report-del" title="Remove this report">✕</button>
          <div style="display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap;align-items:baseline">
            <div>
              <div class="eyebrow">${esc(vtype)} · reviewed ${when}</div>
              <h2>${esc(displayVendor(c.vendor))}</h2>
            </div>
            ${chip}
          </div>
          <p class="summary">${esc(a.summary || "")}</p>
        </div>
        ${reds.length ? `
        <div class="report-section">
          <div style="display:flex;flex-direction:column;gap:1rem">
            ${reds.map((f) => issueRow(f, true)).join("")}
          </div>
        </div>` : ""}
        ${ambers.length ? `
        <div class="report-section">
          <div style="display:flex;flex-direction:column;gap:1rem">
            ${ambers.map((f) => issueRow(f, false)).join("")}
          </div>
        </div>` : ""}
        <div class="report-footer">
          <div>
            <h3>The money</h3>
            <p style="font-size:0.88rem;margin:0;color:var(--ink)">${esc(a.payment_summary || "—")}</p>
          </div>
          <div>
            <h3>Ask ${esc(askWho)} <button class="copy-btn">copy ⧉</button></h3>
            <ul>
              ${(a.questions_for_vendor || []).map((q) => `<li>${esc(q)}</li>`).join("") || "<li>—</li>"}
            </ul>
          </div>
        </div>
      </section>`;
    }).join("");

    document.querySelectorAll(".report").forEach((card) => {
      const id = card.dataset.id;
      const c = contracts.find((x) => x.id === id);
      card.querySelector(".copy-btn").onclick = async () => {
        const qs = ((c.analysis || {}).questions_for_vendor || []).join("\n");
        try { await navigator.clipboard.writeText(qs); VOW.toast("Questions copied ✦"); }
        catch (e) { VOW.toast("Couldn't copy — select and copy by hand"); }
      };
      card.querySelector(".report-del").onclick = async () => {
        if (!confirm(`Remove the ${displayVendor(c.vendor)} report?`)) return;
        await fetch("/api/contracts/" + id, { method: "DELETE" });
        await load();
        renderReports();
      };
    });
  }

  await load();
  renderDrop();
  renderReports();
})();
</script>
</body>
</html>
