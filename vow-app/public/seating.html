<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vow ✦ — Seating</title>
<link rel="stylesheet" href="/vow.css">
<script src="/vow-shell.js"></script>
<style>
  main { width: 100%; max-width: 1080px; margin: 0 auto; padding: 3rem 1.5rem 4rem; flex: 1; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .conflicts { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1.4rem; }

  .layout { display: grid; grid-template-columns: 280px 1fr; gap: 1.6rem; align-items: start; margin-top: 1.6rem; }
  aside .card { padding: 1.3rem 1.4rem; }
  aside h2 { font-family: var(--serif); font-weight: 500; font-size: 1.05rem; margin: 0 0 0.2rem; }
  .toseat-list { display: flex; flex-direction: column; gap: 0.4rem; }
  .hh-btn {
    display: flex; justify-content: space-between; align-items: center; gap: 0.6rem;
    background: var(--card); border: 1px solid var(--hairline); border-radius: 10px;
    padding: 0.55rem 0.9rem; font: inherit; font-size: 0.88rem; cursor: pointer; text-align: left; color: var(--ink);
  }
  .hh-btn.picked { background: var(--rose-tint); border-color: var(--rose); }
  .hh-btn .seats { color: var(--ink-soft); font-size: 0.8rem; }
  .waiting-chip { border: 1px solid var(--hairline); border-radius: 999px; padding: 0.2rem 0.7rem; font-size: 0.78rem; color: var(--ink-faint); }
  .add-input { width: 100%; box-sizing: border-box; padding: 0.55rem 0.9rem; border: 1px solid var(--hairline); border-radius: 10px; font: inherit; font-size: 0.88rem; background: #fff; margin-bottom: 0.5rem; outline: none; }
  .add-input:focus { border-color: var(--rose); }

  .floor { background: var(--card); border: 1px solid var(--hairline); border-radius: 16px; padding: 1.6rem; box-shadow: var(--card-shadow); }
  .floor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1.2rem; }
  .table-card { border: 1px solid var(--hairline); border-radius: 14px; padding: 1rem; text-align: center; background: var(--card); cursor: pointer; position: relative; }
  .table-card:hover { border-color: var(--rose); }
  .table-card.over { border-color: var(--red-border); background: var(--red-tint); }
  .table-card .tname { font-family: var(--serif); font-size: 1.05rem; }
  .table-card .tbar { height: 5px; border-radius: 999px; background: var(--divider); overflow: hidden; margin: 0.55rem 0 0.4rem; }
  .table-card .cap { font-size: 0.8rem; color: var(--ink-soft); }
  .table-card.over .cap { color: var(--red); }
  .table-card .who { font-size: 0.76rem; color: var(--ink-soft); margin-top: 0.35rem; line-height: 1.45; }
  .table-pop { margin-top: 0.5rem; border-top: 1px solid var(--divider); padding-top: 0.5rem; text-align: left; }
  .table-pop .prow { display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; color: var(--ink-soft); padding: 0.15rem 0; }
  .table-pop .prow button { background: none; border: none; color: var(--ink-faint); cursor: pointer; font-size: 0.75rem; padding: 0; }
  .table-pop .prow button:hover { color: var(--red); }
  .tdel { background: none; border: none; color: var(--ink-faint); cursor: pointer; font-size: 0.75rem; padding: 0.2rem 0; }
  .tdel:hover { color: var(--red); }
  @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }
</style>
</head>
<body data-page="seating">
<main>
  <div class="page-head">
    <div>
      <h1 class="page-title">Seating</h1>
      <p class="page-sub" style="margin-top:0.3rem" id="sub"></p>
    </div>
    <button class="btn primary" id="auto-btn">✦ Seat everyone for me</button>
  </div>

  <div class="conflicts" id="conflicts"></div>

  <div class="layout">
    <aside>
      <section class="card" id="toseat-card">
        <h2>Still to seat</h2>
        <p style="color:var(--ink-soft);font-size:0.8rem;margin:0 0 0.8rem">Tap a household, then a table.</p>
        <div class="toseat-list" id="toseat"></div>
        <details class="fold" style="margin-top:0.9rem" id="waiting-fold">
          <summary id="waiting-summary"></summary>
          <div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.5rem" id="waiting"></div>
        </details>
      </section>

      <section class="card" style="margin-top:1rem">
        <h2 style="margin-bottom:0.7rem">Add a table</h2>
        <input class="add-input" id="t-name" placeholder="Name">
        <input class="add-input" id="t-seats" placeholder="Seats" type="number" min="1" style="margin-bottom:0.7rem">
        <button class="btn secondary" id="t-add" style="width:100%">Add</button>
      </section>
    </aside>

    <section class="floor">
      <div class="floor-grid" id="floor"></div>
    </section>
  </div>
</main>

<script>
(async function () {
  const $ = (id) => document.getElementById(id);
  const esc = VOW.esc;

  let view, guests, picked = null, openTable = null, seating = false;

  async function load() {
    [view, guests] = await Promise.all([
      fetch("/api/seating").then((r) => r.json()),
      fetch("/api/guests").then((r) => r.json()),
    ]);
  }

  const surname = (name) => name.replace(/\s*Family\s*$/i, "");
  const seatsOf = (h) => (h.attending_count || 0) +
    (h.plus_one_allowed && h.plus_one_name ? 1 : 0);
  const tableLabel = (t) => /^\d+$/.test(t.name) ? `Table ${t.name}` : t.name;

  function render() {
    const byId = Object.fromEntries(guests.households.map((h) => [h.id, h]));
    const confirmed = guests.households.reduce((s, h) => s + (h.rsvp === "confirmed" ? (h.attending_count || 0) : 0), 0);
    const seated = view.tables.reduce((s, t) => s + (t.seats_used || 0), 0);
    const seats = view.tables.reduce((s, t) => s + (t.capacity || 0), 0);
    $("sub").textContent = `${seated} of ${confirmed} confirmed guests have a seat · ${view.tables.length} tables, ${seats} seats.`;

    /* conflict chips (condensed) */
    const chips = [];
    view.tables.forEach((t) => {
      const over = (t.seats_used || 0) - (t.capacity || 0);
      if (over > 0) chips.push(`${tableLabel(t)} is ${over} over capacity`);
    });
    const unseatedConfirmed = view.unassigned.filter((u) => u.rsvp === "confirmed");
    if (unseatedConfirmed.length) chips.push(`${unseatedConfirmed.length} household${unseatedConfirmed.length === 1 ? "" : "s"} still need a table`);
    const seatedIds = new Set(view.tables.flatMap((t) => t.households || []));
    guests.households.forEach((h) => {
      if (h.rsvp === "declined" && seatedIds.has(h.id)) chips.push(`${surname(h.household)} declined but is still seated`);
    });
    $("conflicts").innerHTML = chips.map((c) => `<span class="chip-alert">${esc(c)}</span>`).join("");

    /* sidebar: still to seat (confirmed) */
    unseatedConfirmed.sort((a, b) => seatsOf(byId[b.id] || b) - seatsOf(byId[a.id] || a));
    $("toseat").innerHTML = unseatedConfirmed.map((u) => `
      <button class="hh-btn ${picked === u.id ? "picked" : ""}" data-id="${u.id}">
        <span style="font-weight:500">${esc(u.household)}</span>
        <span class="seats">${seatsOf(byId[u.id] || u)} seat${seatsOf(byId[u.id] || u) === 1 ? "" : "s"}</span>
      </button>`).join("") ||
      `<p style="color:var(--ink-faint);font-size:0.85rem;margin:0">Everyone confirmed has a seat ✓</p>`;
    document.querySelectorAll(".hh-btn").forEach((btn) => {
      btn.onclick = () => { picked = picked === btn.dataset.id ? null : btn.dataset.id; render(); };
    });

    /* waiting on RSVP fold */
    const waiting = view.unassigned.filter((u) => u.rsvp !== "confirmed");
    const declined = guests.households.filter((h) => h.rsvp === "declined" && !seatedIds.has(h.id));
    const fold = [...waiting.map((u) => `${surname(u.household)} · ${(byId[u.id] || {}).party_size || "?"}`),
                  ...declined.map((h) => `${surname(h.household)} · declined`)];
    $("waiting-fold").style.display = fold.length ? "" : "none";
    $("waiting-summary").textContent = `${waiting.length + declined.length} waiting on RSVP ▾`;
    $("waiting").innerHTML = fold.map((w) => `<span class="waiting-chip">${esc(w)}</span>`).join("");

    /* floor grid */
    $("floor").innerHTML = view.tables.map((t) => {
      const used = t.seats_used || 0, cap = t.capacity || 0;
      const over = used > cap;
      const names = (t.households || []).map((hid) => surname((byId[hid] || {}).household || "")).filter(Boolean);
      const isOpen = openTable === t.id;
      return `
      <div class="table-card ${over ? "over" : ""}" data-id="${t.id}">
        <div class="tname">${esc(tableLabel(t))}</div>
        <div class="tbar"><div style="width:${cap ? Math.min(100, Math.round((used / cap) * 100)) : 0}%;height:100%;background:${over ? "var(--red)" : "#b98b96"}"></div></div>
        <div class="cap">${used} of ${cap}</div>
        <div class="who">${names.length ? esc(names.join(" · ")) + (over ? ` · ${used - cap} over` : "") : `<span style="color:var(--ink-faint)">empty</span>`}</div>
        ${isOpen ? `
        <div class="table-pop">
          ${(t.households || []).map((hid) => `
            <div class="prow"><span>${esc((byId[hid] || {}).household || hid)}</span><button data-un="${hid}" title="Remove from table">✕</button></div>`).join("") ||
            `<div class="prow" style="color:var(--ink-faint)">no one yet</div>`}
          <button class="tdel" data-del="${t.id}">Remove table</button>
        </div>` : ""}
      </div>`;
    }).join("");

    document.querySelectorAll(".table-card").forEach((card) => {
      card.onclick = async (e) => {
        const tid = card.dataset.id;
        const un = e.target.dataset && e.target.dataset.un;
        const del = e.target.dataset && e.target.dataset.del;
        if (un) {
          view = await fetch("/api/seating/assign", { method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ household_id: un, table_id: null }) }).then((r) => r.json());
          render(); return;
        }
        if (del) {
          if (!confirm("Remove this table? Its households go back to the unseated list.")) return;
          view = await fetch("/api/seating/tables/" + del, { method: "DELETE" }).then((r) => r.json());
          openTable = null; render(); return;
        }
        if (picked) {
          const res = await fetch("/api/seating/assign", { method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ household_id: picked, table_id: tid }) });
          if (res.ok) {
            view = await res.json();
            const name = (byId[picked] || {}).household || "";
            picked = null; render();
            VOW.toast(`${surname(name)} seated ✦`);
          }
          return;
        }
        openTable = openTable === tid ? null : tid;
        render();
      };
    });
  }

  /* add a table */
  $("t-add").onclick = async () => {
    const name = $("t-name").value.trim();
    const capacity = +$("t-seats").value || 8;
    if (!name) { VOW.toast("Give the table a name"); return; }
    const res = await fetch("/api/seating/tables", { method: "POST",
      headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name, capacity }) });
    if (res.ok) {
      view = await res.json();
      $("t-name").value = ""; $("t-seats").value = "";
      render();
    }
  };

  /* auto-seat */
  $("auto-btn").onclick = async () => {
    if (seating) return;
    seating = true;
    $("auto-btn").disabled = true;
    $("auto-btn").textContent = "✦ Working on the room…";
    try {
      const res = await fetch("/api/seating/auto", { method: "POST" });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Couldn't start the seating run.");
      const result = await VOW.pollJob(data.job_id);
      await load();
      render();
      VOW.toast(result.applied ? "Everyone has a seat — take a look ✦" : "Vow's plan needs a human touch — try once more");
    } catch (e) {
      VOW.toast(e.message || "Something went wrong — try again.");
    }
    seating = false;
    $("auto-btn").disabled = false;
    $("auto-btn").textContent = "✦ Seat everyone for me";
  };

  await load();
  render();
})();
</script>
</body>
</html>
