<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vow ✦ — Sign in</title>
<link rel="stylesheet" href="/vow.css">
<script src="/vow-shell.js"></script>
<style>
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2.5rem 1.2rem; min-height: 100vh; box-sizing: border-box;
    background: #faf7f3 radial-gradient(ellipse 80% 60% at 50% -10%, rgba(160,92,109,0.07), transparent);
  }
  main { width: 100%; max-width: 420px; animation: vow-rise 0.5s ease both; }
  .brand { text-align: center; margin-bottom: 2rem; position: relative; }
  .brand-name { font-family: var(--serif); font-size: 1.7rem; font-weight: 600; display: inline-flex; align-items: center; gap: 0.4rem; }
  .brand-tag { font-family: var(--serif); font-style: italic; color: var(--ink-soft); margin: 0.4rem 0 0; font-size: 1rem; }
  .auth-card { background: var(--card); border: 1px solid var(--hairline); border-radius: 20px; padding: 2.2rem 2.2rem 2rem; box-shadow: 0 1px 3px rgba(38,34,42,0.05); }
  .seg { display: flex; border: 1px solid var(--hairline); border-radius: 999px; padding: 3px; margin-bottom: 1.8rem; }
  .seg button { flex: 1; border: none; border-radius: 999px; padding: 0.5rem; font: inherit; font-size: 0.85rem; font-weight: 500; cursor: pointer; background: transparent; color: var(--ink-soft); }
  .seg button.on { background: var(--rose-deep); color: #fff; font-weight: 600; }
  label { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-soft); font-weight: 600; margin: 0 0 0.4rem; }
  .auth-input { width: 100%; box-sizing: border-box; padding: 0.8rem 1rem; border: 1px solid var(--hairline); border-radius: 12px; font: inherit; font-size: 0.95rem; background: #fff; outline: none; }
  .auth-input:focus { border-color: var(--rose); }
  .cta { display: block; text-align: center; width: 100%; margin-top: 1.4rem; background: var(--rose-deep); color: #fff; border-radius: 999px; padding: 0.85rem; font-size: 0.95rem; font-weight: 600; text-decoration: none; box-sizing: border-box; border: none; cursor: pointer; font-family: inherit; }
  .cta:hover { background: var(--rose); }
  .divider { display: flex; align-items: center; gap: 0.9rem; margin: 1.6rem 0; }
  .divider span:first-child, .divider span:last-child { flex: 1; height: 1px; background: var(--hairline); }
  .divider .or { flex: none; color: var(--ink-faint); font-size: 0.75rem; height: auto; background: none; }
  .oauth { display: flex; align-items: center; justify-content: center; gap: 0.6rem; width: 100%; background: var(--card); border: 1px solid var(--hairline); border-radius: 999px; padding: 0.7rem; font: inherit; font-size: 0.88rem; font-weight: 500; cursor: pointer; color: var(--ink); }
  .oauth:hover { border-color: #c9bfb6; }
  .foot-note { text-align: center; color: var(--ink-faint); font-size: 0.78rem; margin-top: 1.4rem; }
</style>
</head>
<body data-chrome="none">
<main>
  <div class="brand">
    <div aria-hidden="true" style="position:absolute;inset:0;pointer-events:none">
      <span style="position:absolute;left:18%;top:30px;color:#c9a1ac;font-size:0.6rem;animation:vow-drift 7s ease-in-out infinite">✦</span>
      <span style="position:absolute;right:16%;top:12px;color:#d8b9c1;font-size:0.5rem;animation:vow-drift 9s ease-in-out 3s infinite">✦</span>
    </div>
    <div class="brand-name">Vow <span style="color:var(--rose);font-size:1.1rem">✦</span></div>
    <p class="brand-tag">Your wedding, under control.</p>
  </div>

  <div class="auth-card">
    <div class="seg">
      <button id="seg-in" class="on">Sign in</button>
      <button id="seg-up">Create account</button>
    </div>

    <p id="signup-note" hidden style="color:var(--ink-soft);font-size:0.88rem;margin:0 0 1.4rem;text-align:center">One account for both of you — invite your partner after signup.</p>

    <label>Email</label>
    <input type="email" id="email" class="auth-input" placeholder="you@example.com" style="margin-bottom:1.1rem" autocomplete="email">
    <label>Password</label>
    <input type="password" id="password" class="auth-input" placeholder="••••••••" autocomplete="current-password">

    <p id="auth-msg" hidden style="font-size:0.85rem;margin:0.8rem 0 0"></p>

    <button class="cta" id="cta">Sign in</button>

    <div class="divider"><span></span><span class="or">or</span><span></span></div>

    <div style="display:flex;flex-direction:column;gap:0.6rem">
      <button class="oauth" id="google-btn">
        <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.7 2.4 30.2 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.9 6.2C12.4 13.6 17.7 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.6 5.9c4.5-4.1 7-10.2 7-17.6z"></path><path fill="#FBBC05" d="M10.5 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-7.9-6.2C1 16.1 0 19.9 0 24s1 7.9 2.6 10.8l7.9-6.2z"></path><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.6l-7.6-5.9c-2.1 1.4-4.7 2.2-7.6 2.2-6.3 0-11.6-4.1-13.5-9.9l-7.9 6.2C6.5 42.6 14.6 48 24 48z"></path></svg>
        Continue with Google
      </button>
    </div>
  </div>

  <p class="foot-note">Planning together? Both of you sign in to the same wedding.</p>
</main>

<script>
(function () {
  const segIn = document.getElementById("seg-in");
  const segUp = document.getElementById("seg-up");
  const cta = document.getElementById("cta");
  const msg = document.getElementById("auth-msg");
  let signin = true;

  function mode(isSignin) {
    signin = isSignin;
    segIn.classList.toggle("on", signin);
    segUp.classList.toggle("on", !signin);
    document.getElementById("signup-note").hidden = signin;
    document.getElementById("password").autocomplete = signin ? "current-password" : "new-password";
    cta.textContent = signin ? "Sign in" : "Start planning →";
    say("");
  }
  segIn.onclick = () => mode(true);
  segUp.onclick = () => mode(false);

  function say(text, ok) {
    msg.hidden = !text;
    msg.textContent = text;
    msg.style.color = ok ? "var(--ink-soft)" : "#a03c3c";
  }

  cta.onclick = async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    if (!email || !password) return say("Enter your email and password.");
    cta.disabled = true;
    say(signin ? "Signing in…" : "Creating your account…", true);
    try {
      const res = await fetch(signin ? "/api/auth/login" : "/api/auth/signup", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const body = await res.json();
      if (!res.ok) throw new Error(body.error || "Something went wrong.");
      if (body.confirm_email) { say(body.message, true); return; }
      // New accounts go to onboarding; returning couples straight home.
      if (!signin) { location.href = "/onboarding"; return; }
      const profile = await fetch("/api/profile").then((r) => r.json()).catch(() => ({}));
      location.href = profile && profile.onboarded ? "/" : "/onboarding";
    } catch (e) {
      say(e.message);
    } finally {
      cta.disabled = false;
    }
  };
  document.getElementById("password").addEventListener("keydown", (e) => {
    if (e.key === "Enter") cta.click();
  });

  document.getElementById("google-btn").onclick = async () => {
    try {
      const cfg = await fetch("/api/auth/config").then((r) => r.json());
      if (!cfg.supabase_url) throw new Error("Google sign-in isn't configured yet.");
      const back = encodeURIComponent(location.origin + "/auth/callback");
      location.href = cfg.supabase_url + "/auth/v1/authorize?provider=google&redirect_to=" + back;
    } catch (e) {
      say(e.message || "Google sign-in isn't available right now.");
    }
  };
})();
</script>
</body>
</html>
